name: CI/CD Pipeline - CarelonRx Roadmap

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Test Backend
  # ─────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Check for syntax errors
        run: node --check server.js
        working-directory: backend

  # ─────────────────────────────────────────
  # JOB 2: Validate Frontend HTML
  # ─────────────────────────────────────────
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check frontend files exist
        run: |
          echo "Checking critical frontend files..."
          test -f frontend/login.html && echo "✅ login.html"
          test -f frontend/dashboard.html && echo "✅ dashboard.html"
          test -f frontend/roadmap.html && echo "✅ roadmap.html"
          test -f frontend/admin.html && echo "✅ admin.html"
          test -f frontend/intake.html && echo "✅ intake.html"
          echo "All frontend files present."

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Render (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-backend, validate-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy - Backend
        run: |
          echo "Triggering Render backend deploy..."
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" | grep -q "^2" && \
            echo "✅ Backend deploy triggered" || \
            echo "⚠️  Backend deploy hook not configured (set RENDER_DEPLOY_HOOK_BACKEND secret)"

      - name: Trigger Render Deploy - Frontend
        run: |
          echo "Triggering Render frontend deploy..."
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" | grep -q "^2" && \
            echo "✅ Frontend deploy triggered" || \
            echo "⚠️  Frontend deploy hook not configured (set RENDER_DEPLOY_HOOK_FRONTEND secret)"

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  CarelonRx Roadmap - Deployment Summary"
          echo "============================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Time    : $(date -u)"
          echo "============================================"
