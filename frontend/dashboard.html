<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarelonRx Roadmap - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <img src="assets/carelon-rx-logo.png" alt="CarelonRx Logo" class="h-10 w-auto">
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Roadmap</h1>
                        <p class="text-xs text-gray-600">Product Initiative Management</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.href='user-guide.html'" 
                        class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition flex items-center space-x-2">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                        <span>User Guide</span>
                    </button>
                    <button onclick="window.location.href='intake.html'" 
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center space-x-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>New Initiative</span>
                    </button>
                    <button onclick="window.location.href='roadmap.html'" 
                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition flex items-center space-x-2">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                        <span>View Roadmap</span>
                    </button>
                    <button id="adminLink" onclick="window.location.href='admin.html'" 
                        class="hidden bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition flex items-center space-x-2">
                        <i data-lucide="shield" class="w-4 h-4"></i>
                        <span>Admin</span>
                    </button>
                    
                    <!-- Profile Dropdown -->
                    <div class="relative">
                        <button onclick="toggleProfileDropdown()" class="flex items-center space-x-3 bg-gray-100 hover:bg-gray-200 rounded-lg px-3 py-2 transition">
                            <div id="userProfileImage" class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-sm font-bold overflow-hidden">
                                <span id="userInitials">U</span>
                                <img id="userImage" src="" alt="Profile" class="hidden w-full h-full object-cover">
                            </div>
                            <span id="userName" class="font-semibold text-gray-700"></span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-50">
                            <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span>My Profile</span>
                            </a>
                            <hr class="my-2">
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50 flex items-center space-x-2">
                                <i data-lucide="log-out" class="w-4 h-4"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">Total Initiatives</p>
                        <p id="totalInitiatives" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i data-lucide="briefcase" class="w-8 h-8 text-blue-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">Budget Approved</p>
                        <p id="budgetApproved" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i data-lucide="check-circle" class="w-8 h-8 text-green-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-yellow-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">Pending Approval</p>
                        <p id="pendingApproval" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <i data-lucide="clock" class="w-8 h-8 text-yellow-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-purple-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">This Quarter</p>
                        <p id="thisQuarter" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i data-lucide="calendar-check" class="w-8 h-8 text-purple-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b">
                <div class="flex items-center space-x-2">
                    <input type="text" id="searchInput" placeholder="Search initiatives..." 
                        class="border rounded-lg px-3 py-2 text-sm">
                    <select id="filterYear" class="border rounded-lg px-3 py-2 text-sm">
                        <option value="all">All Years</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th onclick="sortTable('name')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>Initiative Name</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th onclick="sortTable('year')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>Year</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th onclick="sortTable('quarter')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>Quarter</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th onclick="sortTable('budget')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>Budget</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th onclick="sortTable('priority')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>Priority</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th onclick="sortTable('wsjf')" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100">
                                <div class="flex items-center space-x-1">
                                    <span>WSJF</span>
                                    <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                                </div>
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="initiativesTable" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.username) {
            window.location.href = 'login.html';
        }
        document.getElementById('userName').textContent = user.name || user.username;
        
        if (user.role === 'admin') {
            document.getElementById('adminLink').classList.remove('hidden');
        }

        let currentInitiatives = [];
        let sortColumn = null;
        let sortDirection = 'asc';

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('hidden');
            lucide.createIcons();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('profileDropdown');
            const button = event.target.closest('button[onclick="toggleProfileDropdown()"]');
            
            if (!button && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function loadUserProfile() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            // Set user name
            document.getElementById('userName').textContent = user.name || user.username;
            
            // Set initials
            const initials = (user.name || user.username || 'U').split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            document.getElementById('userInitials').textContent = initials;
            
            // Load profile image if exists
            if (user.profileImage) {
                document.getElementById('userImage').src = user.profileImage;
                document.getElementById('userImage').classList.remove('hidden');
                document.getElementById('userInitials').classList.add('hidden');
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch('https://carelonrx-roadmap.onrender.com/api/initiatives', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    currentInitiatives = data.initiatives;
                    updateStats(currentInitiatives);
                    // Sort by WSJF descending by default
                    sortColumn = 'wsjf';
                    sortDirection = 'desc';
                    sortTable('wsjf');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }

            const sorted = [...currentInitiatives].sort((a, b) => {
                let aVal, bVal;

                switch(column) {
                    case 'name':
                        aVal = (a.name || '').toLowerCase();
                        bVal = (b.name || '').toLowerCase();
                        break;
                    case 'year':
                        aVal = parseInt(a.year) || 0;
                        bVal = parseInt(b.year) || 0;
                        break;
                    case 'quarter':
                        const quarterOrder = {'Q1': 1, 'Q2': 2, 'Q3': 3, 'Q4': 4};
                        aVal = quarterOrder[a.quarter] || 0;
                        bVal = quarterOrder[b.quarter] || 0;
                        break;
                    case 'budget':
                        aVal = a.budgetApproved ? 1 : 0;
                        bVal = b.budgetApproved ? 1 : 0;
                        break;
                    case 'priority':
                        const priorityOrder = {'Critical': 4, 'High': 3, 'Medium': 2, 'Low': 1};
                        aVal = priorityOrder[a.priority] || 0;
                        bVal = priorityOrder[b.priority] || 0;
                        break;
                    case 'wsjf':
                        aVal = parseFloat(a.wsjf) || 0;
                        bVal = parseFloat(b.wsjf) || 0;
                        break;
                    case 'deliveryDate':
                        aVal = a.deliveryDate ? new Date(a.deliveryDate).getTime() : 0;
                        bVal = b.deliveryDate ? new Date(b.deliveryDate).getTime() : 0;
                        break;
                    default:
                        return 0;
                }

                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable(sorted);
        }

        function updateStats(initiatives) {
            document.getElementById('totalInitiatives').textContent = initiatives.length;
            document.getElementById('budgetApproved').textContent = initiatives.filter(i => i.budgetApproved).length;
            document.getElementById('pendingApproval').textContent = initiatives.filter(i => !i.budgetApproved).length;
            
            const currentQuarter = Math.ceil((new Date().getMonth() + 1) / 3);
            document.getElementById('thisQuarter').textContent = initiatives.filter(i => i.quarter === `Q${currentQuarter}`).length;
        }

        function renderTable(initiatives) {
            const tbody = document.getElementById('initiativesTable');
            
            if (initiatives.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-gray-500">
                            <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 text-gray-400"></i>
                            <p>No initiatives found. Create your first initiative!</p>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = initiatives.map(initiative => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div class="font-semibold text-gray-800">${initiative.name}</div>
                        <div class="text-sm text-gray-500">${initiative.description || 'No description'}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-700">${initiative.year}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${initiative.quarter}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${initiative.budgetApproved ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${initiative.budgetApproved ? 'Approved' : 'Pending'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${getPriorityClass(initiative.priority)}">
                            ${initiative.priority}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 text-sm font-bold rounded-lg bg-purple-100 text-purple-800">
                            ${initiative.wsjf ? parseFloat(initiative.wsjf).toFixed(2) : 'N/A'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="viewInitiative('${initiative.id}')" class="text-blue-600 hover:text-blue-800 mr-2" title="View/Edit">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                        ${initiative.canEdit ? `
                        <button onclick="deleteInitiative('${initiative.id}')" class="text-red-600 hover:text-red-800" title="Delete">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
            
            lucide.createIcons();
        }

        function getPriorityClass(priority) {
            const classes = {
                'Critical': 'bg-red-100 text-red-800',
                'High': 'bg-orange-100 text-orange-800',
                'Medium': 'bg-blue-100 text-blue-800',
                'Low': 'bg-gray-100 text-gray-800'
            };
            return classes[priority] || 'bg-gray-100 text-gray-800';
        }

        function viewInitiative(id) {
            window.location.href = `intake.html?id=${id}`;
        }

        async function deleteInitiative(id) {
            if (!confirm('Are you sure you want to delete this initiative?')) return;
            
            try {
                const response = await fetch(`https://carelonrx-roadmap.onrender.com/api/initiatives/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    loadDashboard();
                } else {
                    alert(data.message || 'Failed to delete initiative');
                }
            } catch (error) {
                console.error('Error deleting initiative:', error);
                alert('Unable to connect to server.');
            }
        }

        document.getElementById('searchInput').addEventListener('input', filterTable);
        document.getElementById('filterYear').addEventListener('change', filterTable);

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const yearFilter = document.getElementById('filterYear').value;
            
            const rows = document.querySelectorAll('#initiativesTable tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                const year = row.children[1]?.textContent;
                
                const matchesSearch = text.includes(searchTerm);
                const matchesYear = yearFilter === 'all' || year === yearFilter;
                
                row.style.display = matchesSearch && matchesYear ? '' : 'none';
            });
        }

        loadDashboard();
        loadUserProfile();
    </script>
</body>
</html>
