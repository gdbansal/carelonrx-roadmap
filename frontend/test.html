<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Storage</title>`n    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Testing Storage Manager</h1>
    <div id="output"></div>
    
    <script src="js/storage.js"></script>
    <script>
        const output = document.getElementById('output');
        
        try {
            output.innerHTML += '<p>Storage Manager loaded: ' + (typeof StorageManager !== 'undefined' ? 'YES' : 'NO') + '</p>';
            
            if (typeof StorageManager !== 'undefined') {
                const result = StorageManager.login('admin', 'admin123');
                output.innerHTML += '<p>Login test result: ' + JSON.stringify(result) + '</p>';
                
                const user = StorageManager.getCurrentUser();
                output.innerHTML += '<p>Current user: ' + JSON.stringify(user) + '</p>';
                
                const initiatives = StorageManager.getInitiatives();
                output.innerHTML += '<p>Initiatives count: ' + initiatives.length + '</p>';
            }
        } catch (error) {
            output.innerHTML += '<p style="color: red;">Error: ' + error.message + '</p>';
            console.error(error);
        }
    </script>
</body>
</html>
