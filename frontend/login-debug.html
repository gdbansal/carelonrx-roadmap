<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarelonRx Roadmap - Login (Debug)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="calendar" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">CarelonRx Roadmap</h1>
            <p class="text-gray-600 mt-2">Product Initiative Management</p>
        </div>

        <div id="debugInfo" class="mb-4 p-3 bg-gray-100 rounded text-xs">
            <p>Debug Info:</p>
            <p id="storageStatus">Checking storage...</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="username" required value="admin"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your username">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required value="admin123"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your password">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 flex items-center justify-center space-x-2">
                <span>Sign In</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div id="errorMessage" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg hidden">
            <div class="flex items-center space-x-2">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span id="errorText"></span>
            </div>
        </div>

        <div id="successMessage" class="mt-4 p-3 bg-green-100 text-green-700 rounded-lg hidden">
            <div class="flex items-center space-x-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <span id="successText"></span>
            </div>
        </div>

        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Demo credentials: <span class="font-semibold">admin / admin123</span></p>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script>
        lucide.createIcons();

        // Debug check
        const statusEl = document.getElementById('storageStatus');
        if (typeof StorageManager !== 'undefined') {
            statusEl.innerHTML = '✓ StorageManager loaded<br>';
            statusEl.innerHTML += '✓ localStorage available: ' + (typeof localStorage !== 'undefined') + '<br>';
            
            try {
                const users = JSON.parse(localStorage.getItem('carelonrx_users') || '[]');
                statusEl.innerHTML += '✓ Users in storage: ' + users.length;
            } catch (e) {
                statusEl.innerHTML += '✗ Error reading users: ' + e.message;
            }
        } else {
            statusEl.innerHTML = '✗ StorageManager NOT loaded';
            statusEl.style.color = 'red';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            console.log('Form submitted');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log('Attempting login with:', username);
            
            try {
                const result = StorageManager.login(username, password);
                console.log('Login result:', result);
                
                if (result.success) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showError(result.message || 'Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Error: ' + error.message);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            lucide.createIcons();
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successDiv.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            lucide.createIcons();
        }
    </script>
</body>
</html>
