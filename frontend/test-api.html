<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CarelonRx API Test</h1>
    
    <h2>Test 1: Health Check</h2>
    <button onclick="testHealth()">Test Health Endpoint</button>
    <div id="healthResult" class="result"></div>

    <h2>Test 2: Login</h2>
    <input type="text" id="username" value="admin" placeholder="Username">
    <input type="password" id="password" value="admin123" placeholder="Password">
    <button onclick="testLogin()">Test Login</button>
    <div id="loginResult" class="result"></div>

    <script>
        async function testHealth() {
            const resultDiv = document.getElementById('healthResult');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:5000/api/health');
                const data = await response.json();
                resultDiv.className = 'result success';
                resultDiv.innerHTML = '<strong>Success!</strong><br>' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '<strong>Error!</strong><br>' + error.message;
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                console.log('Sending login request:', { username, password });
                
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '<strong>Login Success!</strong><br>' + 
                        'User: ' + data.user.name + '<br>' +
                        'Role: ' + data.user.role + '<br>' +
                        'Token: ' + data.token.substring(0, 20) + '...';
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '<strong>Login Failed!</strong><br>' + data.message;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '<strong>Error!</strong><br>' + error.message;
                console.error('Login error:', error);
            }
        }
    </script>
</body>
</html>
