<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product 360</title>`n    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/session-manager.js"></script>
    <link rel="stylesheet" href="assets/carelon-theme.css">
    <style>
        /* Side Panel Styles */
        .side-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: linear-gradient(180deg, #5009B5 0%, #3d0891 100%);
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
            padding-top: 20px;
            transition: transform 0.3s ease;
        }
        .side-panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .side-panel-link {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            font-weight: 500;
            cursor: pointer;
        }
        .side-panel-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-left-color: #fbbf24;
        }
        .side-panel-link.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border-left-color: #fbbf24;
        }
        .side-panel-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .side-panel-link.disabled:hover {
            background-color: transparent;
            border-left-color: transparent;
        }
        .side-panel-link i {
            margin-right: 12px;
            width: 20px;
            height: 20px;
        }
        .coming-soon-badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 600;
        }
        .main-content-with-sidebar {
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }
        .side-panel-toggle {
            position: fixed;
            left: 280px;
            top: 20px;
            background: #5009B5;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            padding: 12px 8px;
            cursor: pointer;
            z-index: 101;
            transition: left 0.3s ease;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
        }
        .side-panel-toggle:hover {
            background: #3d0891;
        }
        .side-panel.collapsed {
            transform: translateX(-280px);
        }
        .side-panel.collapsed + .side-panel-toggle {
            left: 0;
        }
        .side-panel.collapsed ~ .main-content-with-sidebar {
            margin-left: 0;
        }
        @media (max-width: 768px) {
            .side-panel {
                transform: translateX(-280px);
            }
            .side-panel-toggle {
                left: 0;
            }
            .main-content-with-sidebar {
                margin-left: 0;
            }
            .side-panel.mobile-open {
                transform: translateX(0);
            }
            .side-panel.mobile-open + .side-panel-toggle {
                left: 280px;
            }
        }
        .content-frame {
            width: 100%;
            height: calc(100vh - 0px);
            border: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Left Side Panel -->
    <div id="sidePanel" class="side-panel">
        <div class="side-panel-header">
            <h2 class="text-white font-bold text-xl">Product 360</h2>
            <p class="text-white text-opacity-70 text-sm mt-1">Integrated Product Suite</p>
        </div>
        <nav class="mt-6">
            <a class="side-panel-link active" onclick="navigateToModule('roadmap', event)">
                <i data-lucide="map" class="w-5 h-5"></i>
                <span>Roadmap</span>
            </a>
            <a class="side-panel-link disabled" onclick="showComingSoon(event)">
                <i data-lucide="calculator" class="w-5 h-5"></i>
                <span>Story Estimations</span>
                <span class="coming-soon-badge">COMING SOON</span>
            </a>
        </nav>
        
        <div class="absolute bottom-0 left-0 right-0 p-6 border-t border-white border-opacity-20">
            <div class="text-white text-opacity-60 text-xs">
                <p class="font-semibold mb-1">Version 2.1</p>
                <p>© 2026 Product 360</p>
            </div>
        </div>
    </div>

    <!-- Toggle Button -->
    <button id="sidePanelToggle" class="side-panel-toggle" onclick="toggleSidePanel()">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
    </button>

    <!-- Main Content -->
    <div class="main-content-with-sidebar">
        <iframe id="contentFrame" class="content-frame" src="dashboard.html"></iframe>
    </div>

    <!-- Coming Soon Modal -->
    <div id="comingSoonModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-2xl max-w-md w-full mx-4 p-8 text-center">
            <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="clock" class="w-10 h-10 text-yellow-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Coming Soon</h2>
            <p class="text-gray-600 mb-6">Story Estimations module is under development and will be available soon.</p>
            <button onclick="closeComingSoonModal()" class="btn-carelon-primary text-white px-6 py-2 rounded-lg">
                Got it
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Check authentication
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.username) {
            window.location.href = 'login.html';
        }

        // Side Panel Functions
        function toggleSidePanel() {
            const sidePanel = document.getElementById('sidePanel');
            const toggleBtn = document.getElementById('sidePanelToggle');
            const toggleIcon = toggleBtn.querySelector('i');
            
            sidePanel.classList.toggle('collapsed');
            
            if (sidePanel.classList.contains('collapsed')) {
                toggleIcon.setAttribute('data-lucide', 'chevron-right');
            } else {
                toggleIcon.setAttribute('data-lucide', 'chevron-left');
            }
            lucide.createIcons();
        }

        function navigateToModule(module, event) {
            event.preventDefault();
            
            // Update active link
            document.querySelectorAll('.side-panel-link').forEach(link => {
                link.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // Load module content
            const iframe = document.getElementById('contentFrame');
            if (module === 'roadmap') {
                iframe.src = 'dashboard.html';
            }
        }

        function showComingSoon(event) {
            event.preventDefault();
            const modal = document.getElementById('comingSoonModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeComingSoonModal() {
            const modal = document.getElementById('comingSoonModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Close modal on outside click
        document.getElementById('comingSoonModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeComingSoonModal();
            }
        });
    </script>
</body>
</html>
