<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product 360 - Story Estimations</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <script src="https://unpkg.com/lucide@0.383.0"></script>
    <script src="assets/session-manager.js?v=2.2"></script>
    <script src="assets/api-config.js"></script>
    <script src="assets/product360-sidebar.js" defer></script>
    <link rel="stylesheet" href="assets/carelon-theme.css">
    <style>
        /* CarelonRx Brand Colors */
        :root {
            --carelon-purple: #5009B5;
            --carelon-purple-dark: #3d0789;
            --carelon-purple-light: #6b1fd4;
        }
        
        .fibonacci-btn {
            transition: all 0.2s;
        }
        .fibonacci-btn:hover {
            transform: scale(1.05);
        }
        .fibonacci-btn.selected {
            transform: scale(1.1);
            box-shadow: 0 4px 6px rgba(80, 9, 181, 0.3);
            background-color: var(--carelon-purple) !important;
            color: white !important;
            border-color: var(--carelon-purple) !important;
        }
        
        /* Primary button styling */
        .btn-primary {
            background-color: var(--carelon-purple);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--carelon-purple-dark);
        }
        
        /* Checkbox styling */
        .checkbox-purple:checked {
            background-color: var(--carelon-purple);
            border-color: var(--carelon-purple);
        }
        
        /* Card sections */
        .dev-section {
            background-color: #e0f2fe;
            border-left: 4px solid #0ea5e9;
        }
        
        .qa-section {
            background-color: #dcfce7;
            border-left: 4px solid #10b981;
        }
        
        /* Icon colors */
        .icon-dev {
            color: #0284c7;
        }
        
        .icon-qa {
            color: #059669;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Top Navigation Bar -->
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Story Estimations</h1>
                        <p class="text-xs text-gray-600">Product 360</p>
                    </div>
                </div>
                <div id="headerButtons" class="hidden items-center space-x-4">
                    <!-- Profile Dropdown -->
                    <div class="relative">
                        <button onclick="toggleProfileDropdown()" id="profileButton" class="flex items-center space-x-3 bg-gray-100 hover:bg-gray-200 rounded-lg px-3 py-2 transition">
                            <div id="userProfileImage" class="w-8 h-8 rounded-full bg-carelon-purple flex items-center justify-center text-white text-sm font-bold overflow-hidden">
                                <span id="userInitials">U</span>
                            </div>
                            <span id="userNameDisplay" class="font-semibold text-gray-700"></span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-50">
                            <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                <span>My Profile</span>
                            </a>
                            <a href="analytics.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                                <i data-lucide="trending-up" class="w-4 h-4"></i>
                                <span>Analytics</span>
                            </a>
                            <a id="adminDropdownLink" href="admin.html" class="hidden px-4 py-2 text-gray-700 hover:bg-gray-100 flex items-center space-x-2">
                                <i data-lucide="shield" class="w-4 h-4"></i>
                                <span>Admin Panel</span>
                            </a>
                            <hr class="my-2">
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50 flex items-center space-x-2">
                                <i data-lucide="log-out" class="w-4 h-4"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="app-container" class="container mx-auto px-4 py-6"></div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE_URL = (window.PRODUCT360_API_BASE || 'https://carelonrx-roadmap.onrender.com') + '/api';

        const FIBONACCI = [0, 0.5, 1, 2, 3, 5, 8, 13];

        // ============================================
        // STATE
        // ============================================
        const state = {
            user: null,
            sessionId: '',
            currentSession: null,
            stories: [],
            showReasonModal: false,
            reasonModalStoryId: null,
            reasonModalPoints: null,
            selectedReason: '',
            showDashboard: false,
            showManageReasons: false,
            editingStoryId: null,
            devOnlyToggle: false,
            qaOnlyToggle: false,
            joiningViaUrl: false // Track if user is joining via shared URL
        };

        // ============================================
        // UTILITIES
        // ============================================
        function safeJsonParse(str, defaultValue) {
            try {
                return JSON.parse(str);
            } catch (e) {
                return defaultValue;
            }
        }

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function extractTicketId(input) {
            if (input.startsWith('http')) {
                const match = input.match(/([A-Z]+-\d+)/);
                return match ? match[1] : input;
            }
            return input;
        }

        // ============================================
        // API FUNCTIONS
        // ============================================
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.message || `HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function createSession(sessionId, sessionData) {
            return await apiCall('/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, sessionData })
            });
        }

        async function getSession(sessionId) {
            return await apiCall(`/sessions/${sessionId}`);
        }

        async function updateSession(sessionId, sessionData) {
            return await apiCall(`/sessions/${sessionId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionData })
            });
        }

        // ============================================
        // USER MANAGEMENT
        // ============================================
        function loadUser() {
            // Check for Story Estimations specific user (not Product360 user)
            const estimatorUser = localStorage.getItem('storyEstimatorUser');
            if (estimatorUser) {
                const userData = safeJsonParse(estimatorUser, null);
                if (userData && userData.name && userData.role) {
                    state.user = userData;
                    
                    // Update header profile display
                    updateHeaderProfile();
                    
                    // Auto-logged in
                    return true;
                }
            }
            return false;
        }

        function updateHeaderProfile() {
            const profileUser = state.user || JSON.parse(localStorage.getItem('user') || 'null');
            if (profileUser) {
                const headerButtons = document.getElementById('headerButtons');
                const userNameDisplay = document.getElementById('userNameDisplay');
                const userInitials = document.getElementById('userInitials');
                const adminLink = document.getElementById('adminDropdownLink');
                if (headerButtons) { headerButtons.classList.remove('hidden'); headerButtons.classList.add('flex'); }
                if (userNameDisplay) { userNameDisplay.textContent = profileUser.name || profileUser.username; }
                if (userInitials) { userInitials.textContent = (profileUser.name || profileUser.username || 'U').charAt(0).toUpperCase(); }
                if (adminLink && (profileUser.role === 'Admin' || profileUser.role === 'admin')) {
                    adminLink.classList.remove('hidden');
                    adminLink.classList.add('block');
                }
            }
        }

        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown) {
                dropdown.classList.toggle('hidden');
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('profileDropdown');
            const button = document.getElementById('profileButton');
            
            if (dropdown && button && !button.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function logout() {
            stopPolling();
            localStorage.removeItem('storyEstimatorUser');
            localStorage.removeItem('storyPointEstimatorSessionId');
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }



        async function leaveSession() {
            if (!confirm('Are you sure you want to leave this session?')) {
                return;
            }

            try {
                // Remove current user from participants list
                const userKey = `${state.user.name}_${state.user.role}`;
                const updatedParticipants = state.currentSession.participants.filter(
                    p => `${p.name}_${p.role}` !== userKey
                );
                
                const updatedSession = {
                    ...state.currentSession,
                    participants: updatedParticipants
                };
                
                // Update session on server
                await updateSession(state.sessionId, updatedSession);
                
                // Clear local state
                stopPolling();
                state.currentSession = null;
                state.sessionId = '';
                state.stories = [];
                localStorage.removeItem('storyPointEstimatorSessionId');
                render();
            } catch (error) {
                console.error('Error leaving session:', error);
                alert('Failed to leave session. Please try again.');
            }
        }

        async function endSession() {
            if (!hasPoPrivileges()) {
                alert('Only Product Owners and Admins can end sessions.');
                return;
            }

            if (!confirm('Are you sure you want to end this session? This will close the session for all participants.')) {
                return;
            }

            try {
                // Mark session as closed
                const closedSession = {
                    ...state.currentSession,
                    status: 'closed',
                    closedBy: state.user.name,
                    closedAt: new Date().toISOString()
                };
                
                await updateSession(state.sessionId, closedSession);
                
                // Clear local state
                stopPolling();
                state.currentSession = null;
                state.sessionId = '';
                state.stories = [];
                localStorage.removeItem('storyPointEstimatorSessionId');
                
                alert('Session has been ended successfully. All participants will need to join a new session.');
                render();
            } catch (error) {
                console.error('Error ending session:', error);
                alert('Failed to end session. Please try again.');
            }
        }

        function hasPoPrivileges() {
            return state.user && (state.user.role === 'PO' || state.user.role === 'SM' || state.user.role === 'Admin');
        }

        function isSessionCreator() {
            return state.user && state.currentSession && state.currentSession.createdBy === state.user.name;
        }

        // ============================================
        // SESSION MANAGEMENT
        // ============================================
        async function handleCreateSession(teamName, sprintValue, projectName) {
            const newSessionId = generateSessionId();
            const sessionData = {
                projectName: projectName || '',
                teamName,
                sprintValue,
                participants: [{ name: state.user.name, role: state.user.role }],
                stories: [],
                estimations: {},
                completedStories: {},
                revealedStories: {},
                createdBy: state.user.name,
                createdAt: new Date().toISOString(),
                minimumActiveUntil: new Date(Date.now() + 2 * 60 * 60 * 1000).toISOString(),
                status: 'active'
            };

            await createSession(newSessionId, sessionData);
            state.sessionId = newSessionId;
            state.currentSession = sessionData;
            state.stories = [];
            localStorage.setItem('storyPointEstimatorSessionId', newSessionId);
            startPolling(); // Start polling for real-time updates
            render();
        }

        async function handleJoinSession(sessionId) {
            const session = await getSession(sessionId);
            if (!session) {
                alert('Session not found');
                return;
            }

            const userKey = `${state.user.name}_${state.user.role}`;
            const existingParticipant = session.participants.find(p => `${p.name}_${p.role}` === userKey);
            
            if (!existingParticipant) {
                session.participants.push({ name: state.user.name, role: state.user.role });
                await updateSession(sessionId, session);
            }

            state.sessionId = sessionId;
            state.currentSession = session;
            state.stories = session.stories || [];
            localStorage.setItem('storyPointEstimatorSessionId', sessionId);
            startPolling(); // Start polling for real-time updates
            render();
        }

        // ============================================
        // STORY MANAGEMENT
        // ============================================
        async function addStory(number, summary, devOnly, qaOnly) {
            const ticketId = extractTicketId(number);
            const newStory = {
                id: Date.now().toString(),
                number: ticketId,
                numberUrl: number.startsWith('http') ? number : null,
                summary,
                restrictions: { devOnly, qaOnly }
            };

            state.stories.push(newStory);
            state.currentSession.stories = state.stories;
            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        async function removeStory(id) {
            if (!isSessionCreator()) {
                alert('Only the session creator can delete stories.');
                return;
            }
            
            state.stories = state.stories.filter(s => s.id !== id);
            state.currentSession.stories = state.stories;
            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        function startEditStory(storyId) {
            if (!isSessionCreator()) {
                alert('Only the session creator can edit stories.');
                return;
            }
            
            state.editingStoryId = storyId;
            render();
        }

        function cancelEditStory() {
            state.editingStoryId = null;
            render();
        }

        async function saveEditStory(storyId) {
            const numberInput = document.getElementById(`editNumber_${storyId}`);
            const summaryInput = document.getElementById(`editSummary_${storyId}`);
            
            if (!numberInput || !summaryInput) return;
            
            const newNumber = numberInput.value.trim();
            const newSummary = summaryInput.value.trim();
            
            if (!newNumber || !newSummary) {
                alert('Story number and summary are required');
                return;
            }
            
            const story = state.stories.find(s => s.id === storyId);
            if (story) {
                // Extract ticket ID if it's a URL
                const ticketId = extractTicketId(newNumber);
                story.number = ticketId;
                story.summary = newSummary;
                
                // Update URL if it's a JIRA link
                if (newNumber.startsWith('http')) {
                    story.numberUrl = newNumber;
                }
                
                state.currentSession.stories = state.stories;
                await updateSession(state.sessionId, state.currentSession);
            }
            
            state.editingStoryId = null;
            render();
        }

        function extractTicketId(input) {
            if (input.startsWith('http')) {
                const match = input.match(/\/browse\/([A-Z]+-\d+)/i);
                return match ? match[1] : input;
            }
            return input;
        }

        // ============================================
        // ESTIMATION MANAGEMENT
        // ============================================
        async function updateEstimation(storyId, points) {
            // Show reason modal for Dev/QA roles (but not for null/? or 0)
            if ((state.user.role === 'Dev' || state.user.role === 'QA') && points !== null && points > 0) {
                state.showReasonModal = true;
                state.reasonModalStoryId = storyId;
                state.reasonModalPoints = points;
                state.selectedReason = '';
                render();
            } else {
                // For other roles, 0 points, or null (?), save directly
                await saveEstimation(storyId, points, '');
            }
        }

        async function saveEstimation(storyId, points, reason) {
            isUpdating = true; // Pause polling during update
            
            if (!state.currentSession.estimations) {
                state.currentSession.estimations = {};
            }
            
            if (!state.currentSession.estimations[storyId]) {
                state.currentSession.estimations[storyId] = {};
            }

            const userKey = `${state.user.name}_${state.user.role}`;
            
            const estimationData = {
                points,
                timestamp: new Date().toISOString()
            };
            
            // Add role-specific reason
            if (state.user.role === 'Dev' && reason) {
                estimationData.devReason = reason;
            } else if (state.user.role === 'QA' && reason) {
                estimationData.qaReason = reason;
            }
            
            state.currentSession.estimations[storyId][userKey] = estimationData;
            
            // Render immediately with local state
            render();
            
            // Then sync to server
            try {
                await updateSession(state.sessionId, state.currentSession);
                
                // Wait a bit before resuming polling to ensure server has processed the update
                setTimeout(() => {
                    isUpdating = false;
                }, 1000); // Wait 1 second
            } catch (error) {
                console.error('Failed to sync estimation:', error);
                isUpdating = false; // Resume polling immediately on error
            }
        }

        function confirmEstimation() {
            saveEstimation(state.reasonModalStoryId, state.reasonModalPoints, state.selectedReason);
            state.showReasonModal = false;
            state.reasonModalStoryId = null;
            state.reasonModalPoints = null;
            state.selectedReason = '';
        }

        function cancelEstimation() {
            state.showReasonModal = false;
            state.reasonModalStoryId = null;
            state.reasonModalPoints = null;
            state.selectedReason = '';
            render();
        }

        function getEstimationReasons(role) {
            if (!state.currentSession) return [];
            
            if (role === 'Dev') {
                const customReasons = state.currentSession.devEstimationReasons;
                if (customReasons && customReasons.length > 0) {
                    return customReasons;
                }
                // Return default Dev reasons if none configured
                return [
                    'Dev analysis is more',
                    'Development is more',
                    'Dev scenarios to be covered are more',
                    'Unit testing will be more'
                ];
            } else if (role === 'QA') {
                const customReasons = state.currentSession.qaEstimationReasons;
                if (customReasons && customReasons.length > 0) {
                    return customReasons;
                }
                // Return default QA reasons if none configured
                return [
                    'QA Analysis will take more time',
                    'Test cases/ scenarios are more',
                    'Testing would take more time',
                    'Documentation will take more time'
                ];
            }
            return [];
        }

        async function addEstimationReason(role, reason) {
            if (!hasPoPrivileges()) return;
            if (!reason.trim()) return;
            
            if (role === 'Dev') {
                if (!state.currentSession.devEstimationReasons || state.currentSession.devEstimationReasons.length === 0) {
                    // Initialize with current reasons (including defaults)
                    state.currentSession.devEstimationReasons = [...getEstimationReasons('Dev')];
                }
                state.currentSession.devEstimationReasons.push(reason);
            } else if (role === 'QA') {
                if (!state.currentSession.qaEstimationReasons || state.currentSession.qaEstimationReasons.length === 0) {
                    // Initialize with current reasons (including defaults)
                    state.currentSession.qaEstimationReasons = [...getEstimationReasons('QA')];
                }
                state.currentSession.qaEstimationReasons.push(reason);
            }
            
            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        async function removeEstimationReason(role, index) {
            if (!hasPoPrivileges()) return;
            
            if (role === 'Dev' && state.currentSession.devEstimationReasons) {
                state.currentSession.devEstimationReasons.splice(index, 1);
            } else if (role === 'QA' && state.currentSession.qaEstimationReasons) {
                state.currentSession.qaEstimationReasons.splice(index, 1);
            }
            
            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        async function revealStory(storyId) {
            if (!hasPoPrivileges()) return;
            
            if (!state.currentSession.revealedStories) {
                state.currentSession.revealedStories = {};
            }
            
            state.currentSession.revealedStories[storyId] = {
                revealedBy: state.user.name,
                revealedAt: new Date().toISOString()
            };

            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        async function markComplete(storyId) {
            if (!hasPoPrivileges()) return;
            
            if (!state.currentSession.completedStories) {
                state.currentSession.completedStories = {};
            }
            
            state.currentSession.completedStories[storyId] = {
                completedBy: state.user.name,
                completedAt: new Date().toISOString()
            };

            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        async function markIncomplete(storyId) {
            if (!hasPoPrivileges()) return;
            
            if (state.currentSession.completedStories && state.currentSession.completedStories[storyId]) {
                delete state.currentSession.completedStories[storyId];
            }

            await updateSession(state.sessionId, state.currentSession);
            render();
        }

        function getUserEstimation(storyId) {
            if (!state.currentSession || !state.user) {
                console.log('âŒ getUserEstimation: No session or user');
                return null;
            }
            
            const userKey = `${state.user.name}_${state.user.role}`;
            const storyEstimations = state.currentSession.estimations[storyId] || {};
            const estimation = storyEstimations[userKey];
            
            if (!estimation) {
                return null;
            }
            
            // Handle both object format and direct value
            const points = typeof estimation === 'object' ? estimation.points : estimation;
            return points;
        }

        function isRevealed(storyId) {
            return state.currentSession?.revealedStories?.[storyId] !== undefined;
        }

        function isComplete(storyId) {
            return state.currentSession?.completedStories?.[storyId] !== undefined;
        }

        // ============================================
        // DASHBOARD FUNCTIONS
        // ============================================
        function getStoryAverageEstimation(storyId) {
            if (!state.currentSession) return 0;
            
            const storyEstimations = state.currentSession.estimations[storyId] || {};
            const estimates = Object.values(storyEstimations)
                .map(est => typeof est === 'object' ? est.points : est)
                .filter(points => points !== null && points !== undefined && !isNaN(points));
            
            if (estimates.length === 0) return 0;
            
            const sum = estimates.reduce((acc, points) => acc + points, 0);
            return Math.round((sum / estimates.length) * 10) / 10;
        }

        function getRoleSpecificAverage(storyId, role) {
            if (!state.currentSession) return 0;
            
            const storyEstimations = state.currentSession.estimations[storyId] || {};
            const roleEstimates = Object.entries(storyEstimations)
                .filter(([userId]) => userId.endsWith(`_${role}`))
                .map(([, est]) => typeof est === 'object' ? est.points : est)
                .filter(points => points !== null && points !== undefined && !isNaN(points));
            
            if (roleEstimates.length === 0) return 0;
            
            const sum = roleEstimates.reduce((acc, points) => acc + points, 0);
            return Math.round((sum / roleEstimates.length) * 10) / 10;
        }

        function downloadEstimationSummary() {
            if (!state.currentSession || !state.stories) return;
            
            let csv = 'Story Number,Summary,Dev Only,QA Only,Dev Avg,QA Avg,Overall Avg,Status\n';
            
            state.stories.forEach(story => {
                const devAvg = getRoleSpecificAverage(story.id, 'Dev') || '-';
                const qaAvg = getRoleSpecificAverage(story.id, 'QA') || '-';
                const overallAvg = getStoryAverageEstimation(story.id) || '-';
                const isCompleted = isComplete(story.id);
                const devOnly = story.restrictions?.devOnly ? 'Yes' : 'No';
                const qaOnly = story.restrictions?.qaOnly ? 'Yes' : 'No';
                
                csv += `"${story.number}","${story.summary}","${devOnly}","${qaOnly}","${devAvg}","${qaAvg}","${overallAvg}","${isCompleted ? 'Complete' : 'In Progress'}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `estimation-summary-${state.currentSession.teamName}-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function toggleDashboard() {
            state.showDashboard = !state.showDashboard;
            render();
        }

        function toggleManageReasons() {
            state.showManageReasons = !state.showManageReasons;
            render();
        }

        function copyShareLink() {
            const shareUrl = `${window.location.origin}${window.location.pathname}?session=${state.sessionId}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert('âœ… Share URL copied to clipboard!\n\nShare this link with your team members to join the session.');
                }).catch(() => {
                    prompt('Copy this URL to share:', shareUrl);
                });
            } else {
                // Fallback for browsers that don't support clipboard API
                prompt('Copy this URL to share:', shareUrl);
            }

        async function loadProjectsDropdown() {
            const container = document.getElementById('projectNameContainer');
            const hint = document.getElementById('projectNameHint');
            if (!container) return;
            try {
                const response = await fetch(`${API_BASE_URL}/jira/projects`);
                const data = await response.json();
                if (data.success && data.projects && data.projects.length > 0) {
                    const select = document.getElementById('projectName');
                    select.innerHTML = `<option value="">Select project...</option>` +
                        data.projects.map(p => `<option value="${p.key}" data-name="${p.name}">${p.label}</option>`).join('');
                    select.disabled = false;
                    select.onchange = () => {
                        const key = select.value;
                        const name = select.options[select.selectedIndex]?.dataset?.name || '';
                        loadTeamsForProject(key, name);
                    };
                    if (hint) hint.textContent = `${data.projects.length} projects loaded`;

                    enableFreeTextFallback();

                container.innerHTML = `<input type="text" id="projectName" placeholder="Enter project name" class="${INPUT_CLS}">`;

                const teams = PROJECT_TEAM_MAP[projectKey];
                const select = document.createElement('select');
                select.id = 'teamName';
                select.className = INPUT_CLS;
                select.innerHTML = `<option value="">Select team...</option>` +
                    teams.map(t => `<option value="${t}">${t}</option>`).join('');
                select.onchange = () => loadSprintsForTeam(select.value);
                container.innerHTML = '';
                container.appendChild(select);
                if (hint) hint.textContent = `${teams.length} teams`;
            } else {
                // Fallback: fetch active teams from JIRA filtered loosely by project
                container.innerHTML = `<select id="teamName" class="${INPUT_CLS}" disabled><option value="">Loading teams...</option></select>`;
                if (hint) hint.textContent = 'Loading teams from JIRA...';
                try {
                    const res = await fetch(`${API_BASE_URL}/jira/active-teams`);
                    const data = await res.json();
                    if (data.success && data.data) {
                        const proj = data.data.find(p => p.projectKey === projectKey);
                        const teams = proj ? proj.activeTeams : [];
                        const select = document.getElementById('teamName');
                        if (teams.length > 0) {
                            select.innerHTML = `<option value="">Select team...</option>` +
                                teams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
                            select.disabled = false;
                            select.onchange = () => loadSprintsForTeam(select.value);
                            if (hint) hint.textContent = `${teams.length} teams`;
                        } else {
                            container.innerHTML = `<input type="text" id="teamName" placeholder="Enter team name" class="${INPUT_CLS}">`;
                            if (hint) hint.textContent = 'No teams found — enter manually';
                            if (sprintContainer) {
                                sprintContainer.innerHTML = `<input type="text" id="sprintValue" placeholder="Enter Sprint value" class="${INPUT_CLS}">`;
                            }
                        }
                    }
                } catch(e) {
                    container.innerHTML = `<input type="text" id="teamName" placeholder="Enter team name" class="${INPUT_CLS}">`;
                    if (hint) hint.textContent = 'Could not load teams';
                }
            }
        }

        window.loadJiraProjects = loadProjectsDropdown;

        async function loadSprintsForTeam(teamName) {
            const container = document.getElementById('sprintValueContainer');
            const hint = document.getElementById('sprintValueHint');
            if (!container) return;
            if (!teamName) {
                container.innerHTML = `<input type="text" id="sprintValue" placeholder="Select a team to load sprints"
                    class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" disabled>`;
                if (hint) hint.textContent = '';
                return;
            }
            // Show loading state
            container.innerHTML = `<input type="text" id="sprintValue" placeholder="Loading sprints..."
                class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" disabled>`;
            if (hint) hint.textContent = 'Fetching sprints from JIRA...';
            try {
                const response = await fetch(`${API_BASE_URL}/jira/sprint-for-team?teamName=${encodeURIComponent(teamName)}`);
                const data = await response.json();
                if (data.success && data.sprints && data.sprints.length > 0) {
                    const stateOrder = { active: 0, future: 1, closed: 2 };
                    const sorted = [...data.sprints].sort((a, b) => {
                        const sd = (stateOrder[a.state] ?? 3) - (stateOrder[b.state] ?? 3);
                        if (sd !== 0) return sd;
                        return new Date(b.startDate || 0) - new Date(a.startDate || 0);
                    });
                    const options = sorted.map(s => {
                        const badge = s.state === 'active' ? ' [Active]' : s.state === 'future' ? ' [Future]' : ' [Closed]';
                        const selected = s.id === data.preSelectedSprintId ? 'selected' : '';
                        return `<option value="${s.name}" ${selected}>${s.name}${badge}</option>`;
                    }).join('');
                    container.innerHTML = `<select id="sprintValue" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">${options}</select>`;
                    if (hint) hint.textContent = `${data.sprints.length} sprints loaded — pre-selected: ${data.preSelectedSprintName || 'none'}`;
                } else {
                    container.innerHTML = `<input type="text" id="sprintValue" placeholder="Sprint Value (e.g., Sprint 24)"
                        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">`;
                    if (hint) hint.textContent = data.message || 'No sprints found — enter manually';
                }
            } catch (error) {
                console.error('Error loading sprints:', error);
                container.innerHTML = `<input type="text" id="sprintValue" placeholder="Sprint Value (e.g., Sprint 24)"
                    class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">`;
                if (hint) hint.textContent = 'Could not load sprints — enter manually';
            }
        }

        window.handleCreateSessionClick = async function() {
            const teamNameElement = document.getElementById('teamName');
            const teamName = teamNameElement ? teamNameElement.value.trim() : '';
            const projectEl = document.getElementById('projectName');
            const projectName = projectEl ? (projectEl.options ? projectEl.options[projectEl.selectedIndex]?.text : projectEl.value.trim()) : '';
            const sprintValue = document.getElementById('sprintValue').value.trim();
            
            if (!teamName || !sprintValue) {
                alert('Please enter team name and sprint value');
                return;
            }
            
            try {
                await handleCreateSession(teamName, sprintValue, projectName);
            } catch (error) {
                alert('Failed to create session: ' + error.message);
            }
        };

        window.handleJoinSessionClick = async function() {
            const sessionId = document.getElementById('sessionIdInput').value.trim();
            
            if (!sessionId) {
                alert('Please enter a session ID');
                return;
            }
            
            try {
                await handleJoinSession(sessionId);
            } catch (error) {
                alert('Failed to join session: ' + error.message);
            }
        };

        function toggleDevOnly() {
            state.devOnlyToggle = !state.devOnlyToggle;
            if (state.devOnlyToggle) {
                state.qaOnlyToggle = false; // Disable QA when Dev is enabled
            }
            render();
        }

        function toggleQaOnly() {
            state.qaOnlyToggle = !state.qaOnlyToggle;
            if (state.qaOnlyToggle) {
                state.devOnlyToggle = false; // Disable Dev when QA is enabled
            }
            render();
        }

        window.toggleDevOnly = toggleDevOnly;
        window.toggleQaOnly = toggleQaOnly;

        window.handleAddStory = async function() {
            const number = document.getElementById('storyNumber').value.trim();
            const summary = document.getElementById('storySummary').value.trim();
            const devOnly = state.devOnlyToggle;
            const qaOnly = state.qaOnlyToggle;
            
            if (!number || !summary) {
                alert('Please enter both story number and summary');
                return;
            }
            
            try {
                await addStory(number, summary, devOnly, qaOnly);
                document.getElementById('storyNumber').value = '';
                document.getElementById('storySummary').value = '';
                state.devOnlyToggle = false;
                state.qaOnlyToggle = false;
                render();
            } catch (error) {
                alert('Failed to add story: ' + error.message);
            }
        };

        // Toggle manual add form
        window.toggleManualAddForm = function() {
            const form = document.getElementById('manualAddForm');
            if (form) form.classList.toggle('hidden');
        };

        // JIRA Import Modal
        let jiraIssuesCache = [];

        window.openJiraImportModal = async function() {
            const modal = document.getElementById('jiraImportModal');
            if (!modal) return;
            modal.classList.remove('hidden');
            const content = document.getElementById('jiraImportContent');
            const countEl = document.getElementById('jiraImportCount');
            content.innerHTML = '<div class="text-center py-8 text-gray-500 text-sm">Loading JIRA issues...</div>';
            jiraIssuesCache = [];
            try {
                const teamName = state.currentSession.teamName;
                const sprintName = state.currentSession.sprintValue;
                const res = await fetch(`${API_BASE_URL}/jira/sprint-issues?teamName=${encodeURIComponent(teamName)}&sprintName=${encodeURIComponent(sprintName)}`);
                const data = await res.json();
                if (data.success && data.issues && data.issues.length > 0) {
                    jiraIssuesCache = data.issues;
                    if (countEl) countEl.textContent = `${data.issues.length} issues found`;
                    content.innerHTML = data.issues.map((issue, i) => `
                        <label class="flex items-start gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0">
                            <input type="checkbox" class="jira-issue-cb mt-0.5 w-4 h-4 accent-purple-600" data-index="${i}" checked>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <a href="${issue.url}" target="_blank" class="text-sm font-semibold text-carelon-purple hover:underline shrink-0">${issue.key}</a>
                                    <span class="text-xs text-gray-400 px-1.5 py-0.5 bg-gray-100 rounded">${issue.issueType}</span>
                                    <span class="text-xs text-gray-400 px-1.5 py-0.5 bg-gray-100 rounded">${issue.status}</span>
                                </div>
                                <p class="text-sm text-gray-700 mt-0.5 truncate">${issue.summary}</p>
                                <p class="text-xs text-gray-400">${issue.assignee}</p>
                            </div>
                        </label>
                    `).join('');
                } else {
                    content.innerHTML = `<div class="text-center py-8 text-gray-500 text-sm">${data.message || 'No issues found for this sprint'}</div>`;
                    if (countEl) countEl.textContent = '';
                }
            } catch (e) {
                content.innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Failed to load JIRA issues</div>';
            }
        };

        window.closeJiraImportModal = function() {
            const modal = document.getElementById('jiraImportModal');
            if (modal) modal.classList.add('hidden');
        };

        window.selectAllJiraIssues = function(checked) {
            document.querySelectorAll('.jira-issue-cb').forEach(cb => cb.checked = checked);
        };

        window.importSelectedJiraIssues = async function() {
            const checkboxes = document.querySelectorAll('.jira-issue-cb');
            const selected = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selected.push(jiraIssuesCache[parseInt(cb.dataset.index)]);
            });
            if (selected.length === 0) { alert('Select at least one issue to import'); return; }
            try {
                for (const issue of selected) {
                    await addStory(issue.key, issue.summary, false, false);
                }
                window.closeJiraImportModal();
                render();
            } catch (e) {
                alert('Failed to import some issues: ' + e.message);
            }
        };

        window.removeStory = removeStory;
        window.startEditStory = startEditStory;
        window.cancelEditStory = cancelEditStory;
        window.saveEditStory = saveEditStory;
        window.updateEstimation = updateEstimation;
        window.revealStory = revealStory;
        window.markComplete = markComplete;
        window.markIncomplete = markIncomplete;
        window.leaveSession = leaveSession;
        window.endSession = endSession;
        window.logout = logout;
        window.toggleProfileDropdown = toggleProfileDropdown;
        window.confirmEstimation = confirmEstimation;
        window.cancelEstimation = cancelEstimation;
        window.selectReason = (reason) => { state.selectedReason = reason; render(); };
        window.addDevReason = () => {
            const input = document.getElementById('newDevReason');
            if (input && input.value.trim()) {
                addEstimationReason('Dev', input.value.trim());
                input.value = '';
            }
        };
        window.addQaReason = () => {
            const input = document.getElementById('newQaReason');
            if (input && input.value.trim()) {
                addEstimationReason('QA', input.value.trim());
                input.value = '';
            }
        };
        window.removeDevReason = (index) => removeEstimationReason('Dev', index);
        window.removeQaReason = (index) => removeEstimationReason('QA', index);
        window.toggleDashboard = toggleDashboard;
        window.downloadEstimationSummary = downloadEstimationSummary;
        window.copyShareLink = copyShareLink;

        // ============================================
        // POLLING FOR REAL-TIME UPDATES
        // ============================================
        let pollInterval = null;
        let isUpdating = false; // Flag to prevent polling during updates

        async function refreshSession() {
            if (!state.sessionId || !state.currentSession || isUpdating) return;
            
            try {
                const session = await getSession(state.sessionId);
                if (session) {
                    console.log('ðŸ”„ Polling - Session status:', session.status);
                    
                    // Check if session has been closed
                    if (session.status === 'closed') {
                        console.log('ðŸ›‘ Session closed detected!');
                        stopPolling();
                        state.currentSession = null;
                        state.sessionId = '';
                        state.stories = [];
                        localStorage.removeItem('storyPointEstimatorSessionId');
                        alert(`Session has been ended by ${session.closedBy || 'the session creator'}. You will need to join a new session.`);
                        render();
                        return;
                    }
                    
                    // Check if there are actual changes
                    const currentData = JSON.stringify({
                        participants: state.currentSession.participants,
                        stories: state.currentSession.stories,
                        estimations: state.currentSession.estimations,
                        revealedStories: state.currentSession.revealedStories,
                        completedStories: state.currentSession.completedStories
                    });
                    
                    const newData = JSON.stringify({
                        participants: session.participants,
                        stories: session.stories,
                        estimations: session.estimations,
                        revealedStories: session.revealedStories,
                        completedStories: session.completedStories
                    });
                    
                    if (currentData !== newData) {
                        state.currentSession = session;
                        state.stories = session.stories || [];
                        render();
                    }
                }
            } catch (error) {
                console.error('Polling error:', error);
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(refreshSession, 3000); // Poll every 3 seconds
            // Started polling for real-time updates
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
                console.log('â¹ï¸ Stopped polling');
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            // Story Estimations initialized
            
            // Check if there's a session ID in the URL (shared link)
            const urlParams = new URLSearchParams(window.location.search);
            const urlSessionId = urlParams.get('session');
            
            if (urlSessionId) {
                // User is joining via shared URL
                state.joiningViaUrl = true;
                state.sessionId = urlSessionId;
            }
            
            const userLoaded = loadUser();
            
            if (userLoaded) {
                // If joining via URL, try to load that session
                if (urlSessionId) {
                    try {
                        const session = await getSession(urlSessionId);
                        if (session) {
                            state.currentSession = session;
                            state.stories = session.stories || [];
                            localStorage.setItem('storyPointEstimatorSessionId', urlSessionId);
                            startPolling(); // Start polling for updates
                        }
                    } catch (error) {
                        console.error('Failed to load session from URL:', error);
                        alert('Session not found. Please check the URL or create a new session.');
                    }
                } else {
                    // Try to load saved session from localStorage
                    const savedSessionId = localStorage.getItem('storyPointEstimatorSessionId');
                    if (savedSessionId) {
                        try {
                            const session = await getSession(savedSessionId);
                            if (session) {
                                state.sessionId = savedSessionId;
                                state.currentSession = session;
                                state.stories = session.stories || [];
                                startPolling(); // Start polling for updates
                            }
                        } catch (error) {
                            console.error('Failed to load saved session:', error);
                        }
                    }
                }
            }
            
            render();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
