<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product 360 - Login</title>`n    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/session-manager.js"></script>
    <link rel="stylesheet" href="assets/carelon-theme.css">
    <style>
        body {
            background: linear-gradient(135deg, #5009B5 0%, #3d0891 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Product 360</h1>
            <p class="text-gray-600 mt-2">Integrated Product Suite</p>
        </div>

        <div id="sessionExpiredMessage" class="mb-4 p-4 bg-yellow-100 text-yellow-800 rounded-lg hidden">
            <div class="flex items-center space-x-2">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span>Your session has expired due to inactivity. Please login again.</span>
            </div>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="username" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your username">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your password">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="ml-2 text-sm text-gray-600">Remember me</span>
                </label>
                <a href="#" class="text-sm text-blue-600 hover:text-blue-800">Forgot password?</a>
            </div>

            <button type="submit"
                class="w-full btn-carelon-primary text-white py-3 rounded-lg font-semibold transition duration-200 flex items-center justify-center space-x-2">
                <span>Sign In</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div id="errorMessage" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg hidden">
            <div class="flex items-center space-x-2">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span id="errorText"></span>
            </div>
        </div>

        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Don't have an account? 
                <a href="signup.html" class="text-blue-600 hover:text-blue-800 font-semibold">Sign Up</a>
            </p>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Check if session expired
        if (checkSessionExpired()) {
            document.getElementById('sessionExpiredMessage').classList.remove('hidden');
            lucide.createIcons();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('https://carelonrx-roadmap.onrender.com/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Invalid credentials');
                }
            } catch (error) {
                showError('Unable to connect to server. Please try again later.');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            lucide.createIcons();
            
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
