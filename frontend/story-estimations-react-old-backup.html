                                                                onChange={(e) => setEditingSummary(e.target.value)}
                                                                placeholder="Story summary"
                                                                className="md:col-span-2 px-3 py-2 border border-gray-400 rounded-md text-gray-900 placeholder-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                                                                onKeyPress={(e) => e.key === 'Enter' && saveEdit()}
                                                            />
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={saveEdit}
                                                                className="px-3 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 text-sm"
                                                            >
                                                                Save
                                                            </button>
                                                            <button
                                                                onClick={cancelEdit}
                                                                className="px-3 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm"
                                                            >
                                                                Cancel
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-3">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-3 mb-1">
                                                                {story.numberUrl ? (
                                                                    <a
                                                                        href={story.numberUrl}
                                                                        target="_blank"
                                                                        rel="noopener noreferrer"
                                                                        className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-medium hover:bg-blue-200 hover:text-blue-900 transition-colors cursor-pointer"
                                                                        title={`Open ${story.numberUrl}`}
                                                                    >
                                                                        {story.number || 'N/A'}
                                                                        <svg className="inline-block ml-1 h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                                                        </svg>
                                                                    </a>
                                                                ) : (
                                                                    <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-medium">
                                                                        {story.number || story.title?.split(' ')[0] || 'N/A'}
                                                                    </span>
                                                                )}
                                                                {currentSession && currentSession.completedStories && currentSession.completedStories[story.id] && (
                                                                    <span className="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-medium">
                                                                        ✓ Complete
                                                                    </span>
                                                                )}
                                                                {story.restrictions && story.restrictions.devOnly && (
                                                                    <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium">
                                                                        👨‍💻 Dev Only
                                                                    </span>
                                                                )}
                                                                {story.restrictions && story.restrictions.qaOnly && (
                                                                    <span className="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-medium">
                                                                        🧪 QA Only
                                                                    </span>
                                                                )}
                                                                {user.role === 'PO' && (
                                                                    <button
                                                                        onClick={() => startEditing(story)}
                                                                        className="p-1 text-gray-400 hover:text-gray-600"
                                                                    >
                                                                        <EditIcon />
                                                                    </button>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center justify-between gap-3">
                                                                <h3 className="text-lg font-medium text-gray-900 flex-1">
                                                                    {story.summary || story.title || 'No summary'}
                                                                </h3>
                                                                {user.role === 'PO' && !isStoryRevealed(story.id) && currentSession?.estimations?.[story.id] && Object.keys(currentSession.estimations[story.id]).length > 0 && (
                                                                    <button
                                                                        onClick={() => revealStoryEstimates(story.id)}
                                                                        className="px-3 py-1 bg-yellow-500 text-white text-sm rounded hover:bg-yellow-600 flex items-center gap-1"
                                                                        title="Reveal team estimates to all members"
                                                                    >
                                                                        👁️ Reveal Estimates
                                                                    </button>
                                                                )}
                                                                {isStoryRevealed(story.id) && (
                                                                    <span className="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">
                                                                        ✓ Estimates Revealed
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            {user.role === 'PO' && (
                                                <button
                                                    onClick={() => removeStory(story.id)}
                                                    className="p-2 text-red-400 hover:text-red-600"
                                                >
                                                    <TrashIcon />
                                                </button>
                                            )}
                                        </div>

                                        {/* PO Status - Compact */}
                                        {user && user.role === 'PO' && currentSession && (
                                            <div className="mt-2 p-2 bg-purple-50 rounded text-xs">
                                                {(() => {
                                                    const summary = getStoryEstimationSummary(story.id);
                                                    if (summary.estimated.length === 0 && summary.notEstimated.length === 0) return null;
                                                    
                                                    return (
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-3">
                                                                {summary.estimated.length > 0 && (
                                                                    <span className="text-green-700">
                                                                        ✅ {summary.estimated.length} estimated
                                                                    </span>
                                                                )}
                                                                {summary.notEstimated.length > 0 && (
                                                                    <span className="text-orange-700">
                                                                        ⏳ {summary.notEstimated.length} waiting
                                                                    </span>
                                                                )}
                                                            </div>
                                                            {!isStoryRevealed(story.id) && (
                                                                <span className="text-purple-600">🔒 Hidden</span>
                                                            )}
                                                        </div>
                                                    );
                                                })()}
                                            </div>
                                        )}

                                        {/* Revealed Team Estimations Display (for all non-PO users) */}
                                        {user.role !== 'PO' && currentSession && isStoryRevealed(story.id) && (
                                            <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded">
                                                <h5 className="text-xs font-medium text-blue-900 mb-2">
                                                    👁️ Revealed by {currentSession.revealedStories[story.id]?.revealedBy}
                                                </h5>
                                                {(() => {
                                                    const summary = getStoryEstimationSummary(story.id);
                                                    return (
                                                        <div className="flex flex-wrap gap-2">
                                                            {summary.estimated.map(est => (
                                                                <div key={est.userId} className="bg-white px-2 py-1 rounded border text-xs flex items-center gap-1">
                                                                    <span className={`px-1 rounded text-xs ${getRoleColor(est.role)}`}>
                                                                        {est.name}
                                                                    </span>
                                                                    <span className="bg-blue-200 px-1 rounded font-bold text-blue-800">
                                                                        {est.points}
                                                                        {est.devReason && (
                                                                            <span className="ml-1 text-blue-700 font-normal text-xs">
                                                                                - {est.devReason}
                                                                            </span>
                                                                        )}
                                                                        {est.qaReason && (
                                                                            <span className="ml-1 text-green-700 font-normal text-xs">
                                                                                - {est.qaReason}
                                                                            </span>
                                                                        )}
                                                                    </span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    );
                                                })()}
                                            </div>
                                        )}

                                        {/* Point Selection */}
                                        <div className="mt-4 flex items-center gap-3 flex-wrap">
                                            <p className="text-sm text-gray-600">Story Points:</p>
                                            <div className="flex flex-wrap gap-2">
                                                {fibonacciPoints.map((point) => (
                                                    <button
                                                        key={point}
                                                        onClick={() => handleRoleEstimation(story.id, point)}
                                                        className={`px-3 py-2 rounded-md border font-medium transition-colors ${
                                                            getUserEstimation(story.id) === point
                                                                ? 'bg-primary-600 text-white border-primary-600'
                                                                : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'
                                                        }`}
                                                    >
                                                        {point}
                                                    </button>
                                                ))}
                                                <button
                                                    onClick={() => handleRoleEstimation(story.id, null)}
                                                    className={`px-3 py-2 rounded-md border font-medium transition-colors ${
                                                        getUserEstimation(story.id) === null
                                                            ? 'bg-gray-600 text-white border-gray-600'
                                                            : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'
                                                    }`}
                                                >
                                                    ?
                                                </button>
                                            </div>

                                            {/* Current User's Estimation Feedback */}
                                            {getUserEstimation(story.id) !== null && (
                                                <div className="mt-3">
                                                    <p className="text-sm text-green-600 font-medium">
                                                        ✓ Your estimate: {getUserEstimation(story.id)} points
                                                    </p>
                                                </div>
                                            )}

                                            {/* Developer Reason Selection */}
                                            {FEATURES.MANAGE_ESTIMATION_REASONS && showDevReason === story.id && user.role === 'Dev' && (
                                                <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                                                    <h4 className="font-medium text-blue-900 mb-3">
                                                        Select the primary reason for this estimation:
                                                    </h4>
                                                    <div className="space-y-2 mb-4">
                                                        {getDevEstimationReasons().map((reason, index) => (
                                                            <label key={index} className="flex items-center">
                                                                <input
                                                                    type="radio"
                                                                    name={`devReason_${story.id}`}
                                                                    value={reason}
                                                                    checked={selectedDevReason === reason}
                                                                    onChange={(e) => setSelectedDevReason(e.target.value)}
                                                                    className="mr-2"
                                                                />
                                                                <span className="text-sm text-gray-700">{reason}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button
                                                            onClick={() => confirmDevEstimation(story.id)}
                                                            disabled={!selectedDevReason}
                                                            className="px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm disabled:bg-gray-300 disabled:cursor-not-allowed"
                                                        >
                                                            Confirm Estimation ({tempPoints} points)
                                                        </button>
                                                        <button
                                                            onClick={cancelDevEstimation}
                                                            className="px-3 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm"
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </div>
                                            )}

                                            {/* QA Reason Selection */}
                                            {FEATURES.MANAGE_ESTIMATION_REASONS && showQaReason === story.id && user.role === 'QA' && (
                                                <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
                                                    <h4 className="font-medium text-green-900 mb-3">
                                                        Select the primary reason for this estimation:
                                                    </h4>
                                                    <div className="space-y-2 mb-4">
                                                        {getQaEstimationReasons().map((reason, index) => (
                                                            <label key={index} className="flex items-center">
                                                                <input
                                                                    type="radio"
                                                                    name={`qaReason_${story.id}`}
                                                                    value={reason}
                                                                    checked={selectedQaReason === reason}
                                                                    onChange={(e) => setSelectedQaReason(e.target.value)}
                                                                    className="mr-2"
                                                                />
                                                                <span className="text-sm text-gray-700">{reason}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button
                                                            onClick={() => confirmQaEstimation(story.id)}
                                                            disabled={!selectedQaReason}
                                                            className="px-3 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 text-sm disabled:bg-gray-300 disabled:cursor-not-allowed"
                                                        >
                                                            Confirm Estimation ({tempPoints} points)
                                                        </button>
                                                        <button
                                                            onClick={cancelQaEstimation}
                                                            className="px-3 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm"
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Estimation Summary - Only show if revealed or user is PO */}
                                        {currentSession && (user.role === 'PO' || isStoryRevealed(story.id)) && (
                                            <div className="mt-6 p-4 bg-gray-50 rounded-lg">
                                                <h4 className="font-medium text-gray-900 mb-3">Estimation Summary</h4>
                                                {(() => {
                                                    const summary = getStoryEstimationSummary(story.id);
                                                    return (
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            <div>
                                                                <p className="text-sm font-medium text-gray-700 mb-2">
                                                                    Estimated ({summary.estimated.length})
                                                                </p>
                                                                <div className="space-y-1">
                                                                    {summary.estimated.map(est => (
                                                                        <div key={est.userId} className="space-y-1">
                                                                            <div className="flex items-center gap-2">
                                                                                <span className={`px-2 py-1 rounded text-xs ${getRoleColor(est.role)}`}>
                                                                                    {est.name} ({est.role})
                                                                                </span>
                                                                                <span className="bg-gray-200 px-2 py-1 rounded text-xs font-mono">
                                                                                    {est.points}
                                                                                    {est.devReason && est.role === 'Dev' && (
                                                                                        <span className="ml-2 text-blue-600 font-normal">
                                                                                            - {est.devReason}
                                                                                        </span>
                                                                                    )}
                                                                                    {est.qaReason && est.role === 'QA' && (
                                                                                        <span className="ml-2 text-green-600 font-normal">
                                                                                            - {est.qaReason}
                                                                                        </span>
                                                                                    )}
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                    {summary.estimated.length === 0 && (
                                                                        <p className="text-sm text-gray-500">No estimations yet</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                            
                                                            <div>
                                                                <p className="text-sm font-medium text-gray-700 mb-2">
                                                                    Pending ({summary.notEstimated.length})
                                                                </p>
                                                                <div className="space-y-1">
                                                                    {summary.notEstimated.map(pending => (
                                                                        <div key={pending.userId} className="flex items-center gap-2">
                                                                            <span className={`px-2 py-1 rounded text-xs ${getRoleColor(pending.role)} opacity-50`}>
                                                                                {pending.name} ({pending.role})
                                                                            </span>
                                                                            <span className="text-xs text-gray-500">Waiting...</span>
                                                                        </div>
                                                                    ))}
                                                                    {summary.notEstimated.length === 0 && (
                                                                        <p className="text-sm text-green-600">All users have estimated!</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })()}

                                                {/* PO Controls - Compact */}
                                                {user.role === 'PO' && (
                                                    <div className="mt-2 flex items-center gap-2">
                                                        {currentSession.completedStories && currentSession.completedStories[story.id] ? (
                                                            <button
                                                                onClick={() => markStoryIncomplete(story.id)}
                                                                className="px-2 py-1 bg-orange-600 text-white rounded text-xs hover:bg-orange-700"
                                                            >
                                                                Reopen
                                                            </button>
                                                        ) : (
                                                            <button
                                                                onClick={() => markStoryComplete(story.id)}
                                                                className="px-2 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700"
                                                            >
                                                                Complete
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    ))}

                                    {/* Completed Stories - Compact */}
                                    {stories.filter(story => currentSession && currentSession.completedStories && currentSession.completedStories[story.id]).length > 0 && (
                                        <div className="mt-4">
                                            <h4 className="text-sm font-medium text-gray-700 mb-2">✅ Completed ({stories.filter(story => currentSession && currentSession.completedStories && currentSession.completedStories[story.id]).length})</h4>
                                            <div className="space-y-1">
                                                {stories
                                                    .filter(story => currentSession && currentSession.completedStories && currentSession.completedStories[story.id])
                                                    .sort((a, b) => {
                                                        // Sort by story number in descending order (latest first)
                                                        const aNum = parseInt(a.number) || 0;
                                                        const bNum = parseInt(b.number) || 0;
                                                        if (aNum && bNum) return bNum - aNum;
                                                        
                                                        // Fallback to ID-based sorting (descending - latest first)
                                                        const aId = String(a.id || '');
                                                        const bId = String(b.id || '');
                                                        return bId.localeCompare(aId);
                                                    })
                                                    .map((story) => {
                                                    const averageEstimation = getStoryAverageEstimation(story.id);
                                                    return (
                                                        <div key={story.id} className="bg-green-50 p-2 rounded border flex items-center justify-between">
                                                            <div className="flex items-center gap-2">
                                                                {story.numberUrl ? (
                                                                    <a
                                                                        href={story.numberUrl}
                                                                        target="_blank"
                                                                        rel="noopener noreferrer"
                                                                        className="bg-green-200 text-green-800 px-2 py-1 rounded text-xs font-medium hover:bg-green-300"
                                                                        title={`Open ${story.numberUrl}`}
                                                                    >
                                                                        {story.number || 'N/A'} ↗
                                                                    </a>
                                                                ) : (
                                                                    <span className="bg-green-200 text-green-800 px-2 py-1 rounded text-xs font-medium">
                                                                        {story.number || story.title?.split(' ')[0] || 'N/A'}
                                                                    </span>
                                                                )}
                                                                <span className="text-xs text-gray-600 truncate max-w-xs">
                                                                    {story.summary || story.title || 'No summary'}
                                                                </span>
                                                            </div>
                                                            
                                                            <div className="flex items-center gap-2">
                                                                <span className="bg-green-200 px-2 py-1 rounded text-xs font-bold text-green-800">
                                                                    {averageEstimation} pts
                                                                </span>
                                                                {user.role === 'PO' && (
                                                                    <button
                                                                        onClick={() => markStoryIncomplete(story.id)}
                                                                        className="px-2 py-1 bg-orange-600 text-white rounded text-xs hover:bg-orange-700"
                                                                        title="Reopen story"
                                                                    >
                                                                        Reopen
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="text-center mt-12 text-gray-500 text-sm">
                            <p>Story points are saved automatically (server when available, browser storage as fallback)</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
