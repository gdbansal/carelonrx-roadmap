    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple icon components (converted to React.createElement to avoid JSX)

        const DashboardIcon = () => React.createElement('svg', {
            className: 'h-4 w-4',
            fill: 'none',

        }, React.createElement('path', {
            strokeLinecap: 'round',
            strokeLinejoin: 'round',
            strokeWidth: 2,
            d: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'
        }));

        function App() {
            // ====== UTILITY FUNCTIONS ======
            // Safe JSON parsing with error handling
            const safeJsonParse = (jsonString, fallback = null) => {
                try {
                    return jsonString ? JSON.parse(jsonString) : fallback;
                } catch (error) {
                    console.warn('❌ Invalid JSON data encountered:', error.message);
                    return fallback;
                }
            };
            // ================================
            
            // ====== FEATURE CONFIGURATION FLAGS ======
            // Set these to true/false to enable/disable features
            const FEATURES = {
                ENHANCED_DASHBOARD_SUMMARY: true,     // Enhanced Dashboard Summary Cards
                ESTIMATION_PROGRESS_BAR: false,       // Smart Estimation Progress Bar - DISABLED
                MANAGE_ESTIMATION_REASONS: true,      // Enable/disable estimation reasons management and selection
            };
            
            // ====== AUDIT LOG CONFIGURATION ======
            const AUDIT_CONFIG = {
                RETENTION_DAYS: 30,                   // Keep audit logs for 30 days (configurable)
                ENABLE_AUDIT_DASHBOARD: true,         // Show audit log button to users
            };
            // ======================================
            
            const [user, setUser] = useState(null);
            const [loginName, setLoginName] = useState('');
            const [loginRole, setLoginRole] = useState('');
            const [sessionId, setSessionId] = useState('');
            const [currentSession, setCurrentSession] = useState(null);
            const [showDashboard, setShowDashboard] = useState(false);
            const [stories, setStories] = useState([]);
            const [newStoryNumber, setNewStoryNumber] = useState('');
            const [newStorySummary, setNewStorySummary] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editingNumber, setEditingNumber] = useState('');
            const [editingSummary, setEditingSummary] = useState('');
            const [showDevReason, setShowDevReason] = useState(null);
            const [selectedDevReason, setSelectedDevReason] = useState('');
            const [showQaReason, setShowQaReason] = useState(null);
            const [selectedQaReason, setSelectedQaReason] = useState('');
            const [tempPoints, setTempPoints] = useState(null);
            const [showCreateSessionForm, setShowCreateSessionForm] = useState(false);
            const [teamName, setTeamName] = useState('');
            const [sprintValue, setSprintValue] = useState('');
            const [devOnlyStory, setDevOnlyStory] = useState(false);
            const [qaOnlyStory, setQaOnlyStory] = useState(false);
            const [hasExplicitlyJoined, setHasExplicitlyJoined] = useState(false);
            const [showManageReasons, setShowManageReasons] = useState(false);
            const [newDevReason, setNewDevReason] = useState('');
            const [newQaReason, setNewQaReason] = useState('');
            const [sharedSessionInfo, setSharedSessionInfo] = useState(null); // For checking PO in shared sessions

            // Fibonacci sequence for story points (limited to 13)
            const fibonacciPoints = [0, 0.5, 1, 2, 3, 5, 8, 13];

            // Get dynamic estimation reasons from session or use defaults
            const getDevEstimationReasons = () => {
                return currentSession?.devEstimationReasons || [
                    'Dev analysis is more',
                    'Development is more',
                    'Dev scenarios to be covered are more',
                    'Unit testing will be more'
                ];
            };

            const getQaEstimationReasons = () => {
                return currentSession?.qaEstimationReasons || [
                    'QA Analysis will take more time',
                    'Test cases/ scenarios are more',
                    'Testing would take more time',
                    'Documentation will take more time'
                ];
            };

            const handleRoleEstimation = (storyId, points) => {
                // If estimation reasons feature is disabled, estimate directly
                if (!FEATURES.MANAGE_ESTIMATION_REASONS) {
                    updateStoryPoints(storyId, points);
                    return;
                }
                
                // If feature is enabled, show reason dialogs for Dev/QA
                if (user.role === 'Dev' && points > 0) {
                    setShowDevReason(storyId);
                    setSelectedDevReason('');
                    setTempPoints(points);
                } else if (user.role === 'QA' && points > 0) {
                    setShowQaReason(storyId);
                    setSelectedQaReason('');
                    setTempPoints(points);
                } else {
                    updateStoryPoints(storyId, points);
                }
            };

            const confirmDevEstimation = (storyId) => {
                updateStoryPoints(storyId, tempPoints, selectedDevReason);
                setShowDevReason(null);
                setSelectedDevReason('');
                setTempPoints(null);
            };

            const confirmQaEstimation = (storyId) => {
                updateStoryPoints(storyId, tempPoints, selectedQaReason);
                setShowQaReason(null);
                setSelectedQaReason('');
                setTempPoints(null);
            };

            const cancelDevEstimation = () => {
                setShowDevReason(null);
                setSelectedDevReason('');
                setTempPoints(null);
            };

            const cancelQaEstimation = () => {
                setShowQaReason(null);
                setSelectedQaReason('');
                setTempPoints(null);
            };

            // Session management functions (defined first)
            const generateSessionId = () => {
                return 'session_' + Math.random().toString(36).substring(2, 11);
            };

            // API Configuration - MongoDB backend enabled for Product 360
            // Story Estimations now uses MongoDB backend with localStorage fallback
            const USE_LOCALSTORAGE_ONLY = false;
            
            const isLocalHost = window.location.hostname === 'localhost' || 
                               window.location.hostname === '127.0.0.1' ||
                               window.location.hostname === '0.0.0.0' ||
                               window.location.port === '64317'; // Browser preview proxy
            
            const API_BASE = isLocalHost
                ? 'http://127.0.0.1:5000/api'  // Local development
                : 'https://carelonrx-roadmap.onrender.com/api';  // Production - same backend as Roadmap
            
            // Debug logging for environment detection
            console.log('🌐 Environment Detection:');
            console.log('- Hostname:', window.location.hostname);
            console.log('- Is Local Host:', isLocalHost);
            console.log('- API Base URL:', API_BASE);
            console.log('- Using LocalStorage Only:', USE_LOCALSTORAGE_ONLY);

            // Check if server is available
            const isServerAvailable = async () => {
                try {
                    const response = await fetch(`${API_BASE}/health`);
                    return response.ok;
                } catch {
                    return false;
                }
            };

            // API Helper functions with localStorage fallback
            const api = {
                async getSession(sessionId) {
                    // Use localStorage only mode for Product 360
                    if (USE_LOCALSTORAGE_ONLY) {
                        console.log('📦 Using localStorage for getSession:', sessionId);
                        const savedData = localStorage.getItem(`session_${sessionId}`);
                        return safeJsonParse(savedData, null);
                    }
                    
                    try {
                        console.log('API Call: getSession', `${API_BASE}/sessions/${sessionId}`);
                        const response = await fetch(`${API_BASE}/sessions/${sessionId}`);
                        console.log('Response status:', response.status, response.statusText);
                        if (response.ok) {
                            const data = await response.json();
                            console.log('✅ getSession success:', data);
                            return data;
                        }
                        console.warn('❌ getSession failed with status:', response.status);
                        return null;
                    } catch (error) {
                        console.error('❌ getSession API call failed:', error);
                        console.error('Server unavailable, using localStorage fallback');
                        // Fallback to localStorage
                        const savedData = localStorage.getItem(`session_${sessionId}`);
                        return safeJsonParse(savedData, null);
                    }
                },

                async createSession(sessionId, sessionData) {
                    // Use localStorage only mode for Product 360
                    if (USE_LOCALSTORAGE_ONLY) {
                        console.log('📦 Using localStorage for createSession:', sessionId);
                        localStorage.setItem(`session_${sessionId}`, JSON.stringify(sessionData));
                        return sessionData;
                    }
                    
                    try {
                        console.log('API Call: createSession', `${API_BASE}/sessions`, sessionData);
                        const response = await fetch(`${API_BASE}/sessions`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ sessionId, sessionData }),
                        });
                        console.log('Create session response status:', response.status, response.statusText);
                        if (response.ok) {
                            const data = await response.json();
                            console.log('✅ createSession success:', data);
                            return data;
                        }
                        console.warn('❌ createSession failed with status:', response.status);
                        throw new Error(`Failed to create session: ${response.status} ${response.statusText}`);
                    } catch (error) {
                        console.error('❌ createSession API call failed:', error);
                        console.error('Server unavailable, using localStorage fallback');
                        // Fallback to localStorage
                        localStorage.setItem(`session_${sessionId}`, JSON.stringify(sessionData));
                        return sessionData;
                    }
                },

                async updateSession(sessionId, sessionData) {
                    // Use localStorage only mode for Product 360
                    if (USE_LOCALSTORAGE_ONLY) {
                        console.log('📦 Using localStorage for updateSession:', sessionId);
                        localStorage.setItem(`session_${sessionId}`, JSON.stringify(sessionData));
                        return sessionData;
                    }
                    
                    try {
                        console.log('API Call: updateSession', `${API_BASE}/sessions/${sessionId}`, sessionData);
                        const response = await fetch(`${API_BASE}/sessions/${sessionId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ sessionData }),
                        });
                        console.log('Update session response status:', response.status, response.statusText);
                        if (response.ok) {
                            const data = await response.json();
                            console.log('✅ updateSession success:', data);
                            return data;
                        }
                        console.warn('❌ updateSession failed with status:', response.status);
                        throw new Error(`Failed to update session: ${response.status} ${response.statusText}`);
                    } catch (error) {
                        console.error('❌ updateSession API call failed:', error);
                        console.error('Server unavailable, using localStorage fallback');
                        // Fallback to localStorage
                        localStorage.setItem(`session_${sessionId}`, JSON.stringify(sessionData));
                        return sessionData;
                    }
                },

                async addParticipant(sessionId, participant) {
                    // Use localStorage only mode for Product 360
                    if (USE_LOCALSTORAGE_ONLY) {
                        console.log('📦 Using localStorage for addParticipant:', sessionId);
                        const savedData = localStorage.getItem(`session_${sessionId}`);
                        const session = safeJsonParse(savedData, null);
                        if (session) {
                            if (!session.participants) session.participants = [];
                            session.participants.push(participant);
                            localStorage.setItem(`session_${sessionId}`, JSON.stringify(session));
                            return session;
                        }
                        return null;
                    }
                    
                    try {
                        console.log('API Call: addParticipant', `${API_BASE}/sessions/${sessionId}/participants`, participant);
                        const response = await fetch(`${API_BASE}/sessions/${sessionId}/participants`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ participant }),
                        });
                        console.log('Add participant response status:', response.status, response.statusText);
                        if (response.ok) {
                            const data = await response.json();
                            console.log('✅ addParticipant success:', data);
                            return data;
                        }
                        console.warn('❌ addParticipant failed with status:', response.status);
                        throw new Error(`Failed to add participant: ${response.status} ${response.statusText}`);
                    } catch (error) {
                        console.error('❌ addParticipant API call failed:', error);
                        console.error('Server unavailable, using localStorage fallback');
                        // Fallback to localStorage - add participant to existing session
                        const existingSession = localStorage.getItem(`session_${sessionId}`);
                        if (existingSession) {
                            const session = safeJsonParse(existingSession, {});
                            if (!session.participants) session.participants = [];
                            
                            // Check for duplicate PO before adding
                            if (participant.role === 'PO') {
                                const existingPO = session.participants.find(p => p.role === 'PO');
                                if (existingPO) {
                                    throw new Error(`Only one Product Owner (PO) is allowed per session. ${existingPO.name} is already the PO.`);
                                }
                            }
                            
                            const existingUser = session.participants.find(p => p.name === participant.name && p.role === participant.role);
                            if (!existingUser) {
                                session.participants.push({ ...participant, joinedAt: new Date().toISOString() });
                                localStorage.setItem(`session_${sessionId}`, JSON.stringify(session));
                            }
                            return session;
                        }
                        return null;
                    }
                }
            };

            const saveSession = async (id, sessionData, isNewSession = false) => {
                try {
                    if (isNewSession) {
                        console.log('Creating new session via API:', id);
                        const result = await api.createSession(id, sessionData);
                        console.log('✅ Session created successfully:', result);
                        return result;
                    } else {
                        console.log('Updating existing session via API:', id);
                        const result = await api.updateSession(id, sessionData);
                        console.log('✅ Session updated successfully:', result);
                        return result;
                    }
                } catch (error) {
                    console.error('❌ Failed to save session:', error);
                    // Show user-friendly error message
                    if (isNewSession) {
                        alert(`Session created locally but may not sync with server. Error: ${error.message}`);
                    }
                    throw error;
                }
            };

            const getSession = async (id) => {
                try {
                    const session = await api.getSession(id);
                    return session;
                } catch (error) {
                    console.error('Failed to load session:', error);
                    return null;
                }
            };

            // Load user and session data from localStorage on component mount
            useEffect(() => {
                // First, check if user is logged in via Product 360 authentication
                const product360User = localStorage.getItem('user');
                if (product360User) {
                    const userData = safeJsonParse(product360User, null);
                    if (userData && userData.username) {
                        // Auto-login with Product 360 user info
                        // Map Product 360 roles to Story Estimations roles
                        let mappedRole = userData.role || 'Dev';
                        
                        // Normalize role to lowercase for comparison
                        const normalizedRole = mappedRole.toLowerCase().replace(/\s+/g, '_');
                        
                        // Map database roles (lowercase with underscores) to Story Estimations roles
                        if (normalizedRole === 'admin') {
                            mappedRole = 'Admin';
                        }
                        else if (normalizedRole === 'product_owner' || normalizedRole === 'product_manager') {
                            mappedRole = 'PO';
                        }
                        else if (normalizedRole === 'scrum_master' || normalizedRole === 'rte') {
                            mappedRole = 'SM';
                        }
                        else if (normalizedRole === 'business_owner' || normalizedRole === 'stakeholder') {
                            mappedRole = 'Dev';
                        }
                        // Keep Dev, QA, PO, SM as is if already in correct format
                        else if (['Dev', 'QA', 'PO', 'SM', 'Admin'].includes(mappedRole)) {
                            // Already in correct format, keep as is
                        }
                        // Default everything else to Dev
                        else {
                            mappedRole = 'Dev';
                        }
                        
                        const estimationUser = {
                            name: userData.fullName || userData.username,
                            role: mappedRole
                        };
                        setUser(estimationUser);
                        setLoginName(estimationUser.name);
                        setLoginRole(estimationUser.role);
                        console.log('✅ Auto-logged in with Product 360 user:', estimationUser);
                        console.log('   Original role:', userData.role, '→ Mapped role:', mappedRole);
                    } else {
                        // Product 360 user exists but incomplete, allow manual login
                        console.log('ℹ️ Product 360 user incomplete, showing manual login');
                        // Fall back to Story Estimations saved user
                        const savedUser = localStorage.getItem('storyPointEstimatorUser');
                        if (savedUser) {
                            const savedUserData = safeJsonParse(savedUser, null);
                            if (savedUserData) {
                                setUser(savedUserData);
                            }
                        }
                    }
                } else {
                    // Not logged in to Product 360, allow manual login for Story Estimations
                    console.log('ℹ️ No Product 360 authentication, allowing manual login for Story Estimations');
                    // Fall back to Story Estimations saved user
                    const savedUser = localStorage.getItem('storyPointEstimatorUser');
                    if (savedUser) {
                        const savedUserData = safeJsonParse(savedUser, null);
                        if (savedUserData) {
                            setUser(savedUserData);
                        }
                    }
                }
                
                // Check for session ID in URL parameters first
                const urlParams = new URLSearchParams(window.location.search);
                const urlSessionId = urlParams.get('session');
                
                if (urlSessionId) {
                    setSessionId(urlSessionId);
                    // Load session info to check for existing PO (for role dropdown filtering)
                    getSession(urlSessionId).then(session => {
                        if (session) {
                            setSharedSessionInfo(session);
                            // Clear PO selection if PO already exists in the session
                            if (loginRole === 'PO' && session.participants?.find(p => p.role === 'PO')) {
                                setLoginRole('');
                            }
                        }
                    }).catch(() => {
                        // Session not found or error - will be handled later
                        setSharedSessionInfo(null);
                    });
                } else {
                    // Fall back to saved session ID
                    const savedSessionId = localStorage.getItem('storyPointEstimatorSessionId');
                    if (savedSessionId) {
                        setSessionId(savedSessionId);
                    }
                    setSharedSessionInfo(null); // Clear shared session info
                }
            }, []);

            // Load session when user or sessionId changes
            useEffect(() => {
                const loadSessionData = async (retryCount = 0) => {
                    if (!user || !sessionId || !hasExplicitlyJoined) return;
                    
                    try {
                        let session = await getSession(sessionId);
                        
                        if (session) {
                            // Check if session is closed
                            if (session.status === 'closed') {
                                alert(`This session has been closed by ${session.closedBy}. You will be logged out.`);
                                setUser(null);
                                setCurrentSession(null);
                                setSessionId('');
                                setStories([]);
                                localStorage.removeItem('storyPointEstimatorSessionId');
                                localStorage.removeItem('storyPointEstimatorUser');
                                return;
                            }
                            
                            // Add user to participants if not already there
                            const existingUser = session.participants.find(p => p.name === user.name && p.role === user.role);
                            if (!existingUser) {
                                // Check if user is trying to rejoin as PO and PO already exists
                                if (user.role === 'PO') {
                                    const existingPO = session.participants.find(p => p.role === 'PO');
                                    if (existingPO) {

            const getStoryEstimationSummary = (storyId) => {
                if (!currentSession) return { estimated: [], notEstimated: [] };
                
                // Get story restrictions
                const story = stories.find(s => s.id === storyId);
                const restrictions = story?.restrictions;
                
                const storyEstimations = currentSession.estimations[storyId] || {};
                const estimatedUsers = Object.keys(storyEstimations);
                
                // Filter users based on story restrictions
                let eligibleUsers = currentSession.participants.map(p => `${p.name}_${p.role}`);
                if (restrictions) {
                    if (restrictions.devOnly) {
                        eligibleUsers = eligibleUsers.filter(userId => userId.endsWith('_Dev'));
                    } else if (restrictions.qaOnly) {
                        eligibleUsers = eligibleUsers.filter(userId => userId.endsWith('_QA'));
                    }
                }
                
                const notEstimatedUsers = eligibleUsers.filter(userId => !estimatedUsers.includes(userId));
                
                return {
                    estimated: estimatedUsers.map(userId => {
                        const [name, role] = userId.split('_');
                        const estimationData = storyEstimations[userId];
                        
                        return { 
                            userId, 
                            name, 
                            role, 
                            points: typeof estimationData === 'object' ? estimationData.points : estimationData,
                            devReason: typeof estimationData === 'object' ? estimationData.devReason : null,
                            qaReason: typeof estimationData === 'object' ? estimationData.qaReason : null,
                            timestamp: typeof estimationData === 'object' ? estimationData.timestamp : null
                        };
                    }).sort((a, b) => {
                        // Sort by story points in descending order
                        const pointsA = parseFloat(a.points) || 0;
                        const pointsB = parseFloat(b.points) || 0;
                        return pointsB - pointsA;
                    }),
                    notEstimated: notEstimatedUsers.map(userId => {

                };

            const getStoryAverageEstimation = (storyId) => {

                const storyEstimations = currentSession.estimations[storyId] || {};
                const estimates = Object.values(storyEstimations)
                    .map(est => typeof est === 'object' ? est.points : est)
                    .filter(points => points !== null && points !== undefined);
                
                if (estimates.length === 0) return 0;
                
                const sum = estimates.reduce((acc, points) => acc + points, 0);
                return Math.round((sum / estimates.length) * 10) / 10; // Round to 1 decimal place
            };

            const getRoleSpecificAverage = (storyId, role) => {
                if (!currentSession) return 0;
                
                const storyEstimations = currentSession.estimations[storyId] || {};
                const roleEstimates = Object.entries(storyEstimations)
                    .filter(([userId, _]) => userId.endsWith(`_${role}`))
                    .map(([_, est]) => typeof est === 'object' ? est.points : est)
                    .filter(points => points !== null && points !== undefined);
                
                if (roleEstimates.length === 0) return 0;
                
                const sum = roleEstimates.reduce((acc, points) => acc + points, 0);
                return Math.round((sum / roleEstimates.length) * 10) / 10; // Round to 1 decimal place
            };

            const downloadEstimationSummary = () => {
                if (!currentSession || stories.length === 0) {
                    alert('No stories available to export.');
                    return;

                // Prepare story analysis data
                const storyAnalysisData = [];
                storyAnalysisData.push(['Story Number', 'JIRA Link', 'Story Summary', 'Restrictions', 'Developer Average', 'QA Average', 'Overall Average', 'Total Estimations']);

                stories.forEach(story => {
                    const devAverage = getRoleSpecificAverage(story.id, 'Dev');
                    const qaAverage = getRoleSpecificAverage(story.id, 'QA');
                    const overallAverage = getStoryAverageEstimation(story.id);
                    
                    const storyEstimations = currentSession.estimations[story.id] || {};
                    const totalEstimations = Object.keys(storyEstimations).length;
                    
                    // Get restriction information
                    let restrictions = '';
                    if (story.restrictions?.devOnly) {
                        restrictions = 'Dev Only';
                    } else if (story.restrictions?.qaOnly) {
                        restrictions = 'QA Only';
                    } else {
                        restrictions = 'All Roles';
                    }
                    
                    // Separate story number and JIRA link into different columns
                    const storyNumber = story.number || 'N/A';
                    const jiraLink = story.numberUrl || '';
                    
                    storyAnalysisData.push([
                        storyNumber,
                        jiraLink,
                        story.summary || story.title || 'No summary',
                        restrictions,
                        devAverage > 0 ? devAverage : 'N/A',
                        qaAverage > 0 ? qaAverage : 'N/A', 
                        overallAverage > 0 ? overallAverage : 'N/A',
                        totalEstimations
                    ]);
                });

                // Prepare deviation analysis data
                const deviationAnalysisHeaders = [
                    'User', 'Role', 'Total Estimates', 'Average Deviation', 'Over Estimate %', 
                    'Under Estimate %', 'Consistency Score', 'Deviation Pattern', 'Typical Deviation Range'
                ];

                // Calculate user deviation metrics
                const userMetrics = {};
                
                stories.forEach(story => {
                    const storyEstimations = currentSession.estimations[story.id] || {};
                    const estimates = Object.entries(storyEstimations).map(([userId, data]) => {
                        const points = typeof data === 'object' ? data.points : data;
                        const role = userId.split('_')[1];
                        return { userId, points: parseFloat(points) || 0, role };
                    });

                    if (estimates.length > 1) { // Need at least 2 estimates to calculate average
                        const overallAvg = estimates.reduce((sum, e) => sum + e.points, 0) / estimates.length;
                        
                        estimates.forEach(estimate => {
                            const { userId, points, role } = estimate;
                            if (!userMetrics[userId]) {
                                userMetrics[userId] = {
                                    role,
                                    estimates: [],
                                    deviations: [],
                                    overEstimates: 0,
                                    underEstimates: 0,
                                    totalEstimates: 0
                                };
                            }
                            
                            const deviation = points - overallAvg;
                            userMetrics[userId].estimates.push(points);
                            userMetrics[userId].deviations.push(deviation);
                            userMetrics[userId].totalEstimates++;
                            
                            if (deviation > 0.5) userMetrics[userId].overEstimates++;
                            else if (deviation < -0.5) userMetrics[userId].underEstimates++;
                        });
                    }
                });

                const deviationAnalysisData = [deviationAnalysisHeaders];
                Object.entries(userMetrics).forEach(([userId, metrics]) => {
                    const avgDeviation = metrics.deviations.length > 0 
                        ? (metrics.deviations.reduce((a, b) => a + b, 0) / metrics.deviations.length).toFixed(2)
                        : '0.00';
                    
                    const overEstimatePercent = metrics.totalEstimates > 0 
                        ? ((metrics.overEstimates / metrics.totalEstimates) * 100).toFixed(1)
                        : '0.0';
                    
                    const underEstimatePercent = metrics.totalEstimates > 0 
                        ? ((metrics.underEstimates / metrics.totalEstimates) * 100).toFixed(1)
                        : '0.0';

                    // Determine consistency score and pattern
                    let consistencyScore = 'Balanced';
                    let deviationPattern = 'Neutral';
                    
                    const overPercent = parseFloat(overEstimatePercent);
                    const underPercent = parseFloat(underEstimatePercent);
                    
                    if (overPercent >= 70) {
                        consistencyScore = 'High Over-Estimator';
                        deviationPattern = 'Consistently High';
                    } else if (underPercent >= 70) {
                        consistencyScore = 'High Under-Estimator';  
                        deviationPattern = 'Consistently Low';
                    } else if (overPercent >= 60) {
                        consistencyScore = 'Moderate Over-Estimator';
                        deviationPattern = 'Generally High';
                    } else if (underPercent >= 60) {
                        consistencyScore = 'Moderate Under-Estimator';
                        deviationPattern = 'Generally Low';
                    }

                    // Calculate typical deviation range
                    const sortedDeviations = [...metrics.deviations].sort((a, b) => a - b);
                    const minDev = sortedDeviations[0] || 0;
                    const maxDev = sortedDeviations[sortedDeviations.length - 1] || 0;
                    const deviationRange = `${minDev.toFixed(1)} to ${maxDev.toFixed(1)}`;

                    deviationAnalysisData.push([
                        userId,
                        metrics.role,
                        metrics.totalEstimates,
                        avgDeviation,
                        `${overEstimatePercent}%`,
                        `${underEstimatePercent}%`,
                        consistencyScore,
                        deviationPattern,
                        deviationRange
                    ]);
                });

                // Combine both sections into multi-section CSV
                const csvSections = [
                    '=== STORY ANALYSIS ===',
                    storyAnalysisData.map(row => 
                        row.map(cell => {
                            const cellStr = String(cell);
                            if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
                                return `"${cellStr.replace(/"/g, '""')}"`;
                            }
                            return cellStr;
                        }).join(',')
                    ).join('\n'),

                                return `"${cellStr.replace(/"/g, '""')}"`;
                            }
                            return cellStr;
                        }).join(',')
                    ).join('\n')
                ];

                const csvContent = csvSections.join('\n');

                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);

                    document.body.removeChild(link);

                    await api.updateSession(sessionId, updatedSession);

                } catch (error) {
                    console.error('Error removing QA reason:', error);
                    alert('Failed to remove reason. Please try again.');
                }
            };

            const closeSession = () => {
                if (!hasPoPrivileges()) {
                    alert('Only Product Owners and Admins can close sessions.');
                    return;
                }

                if (confirm('Are you sure you want to close this session? This will end the session for all participants and they will be logged out.')) {
                    // Mark session as closed
                    const closedSession = {
                        ...currentSession,
                        status: 'closed',
                        closedBy: user.name,
                        closedAt: new Date().toISOString()
                    };
                    
                    saveSession(sessionId, closedSession);
                    
                    // Clear local state and logout
                    setCurrentSession(null);
                    setSessionId('');
                    setStories([]);
                    setUser(null);
                    localStorage.removeItem('storyPointEstimatorSessionId');
                    localStorage.removeItem('storyPointEstimatorUser');
                    
                    alert('Session has been closed successfully. All participants will be logged out.');
                }
            };

            const openAuditLog = () => {
                // Open audit log dashboard in new tab
                const auditUrl = `${window.location.protocol}//${window.location.hostname}:${window.location.port}/admin`;
                window.open(auditUrl, '_blank');
            };

            const getSessionTimeInfo = () => {
                if (!currentSession || !currentSession.minimumActiveUntil) return null;
                
                // PO and Admin can always close sessions regardless of time restrictions
                if (user && hasPoPrivileges()) {
                    return { canClose: true, message: 'Session can be closed' };
                }
                
                const now = new Date();
                const minimumActiveUntil = new Date(currentSession.minimumActiveUntil);
                const canClose = now >= minimumActiveUntil;
                
                if (canClose) {
                    return { canClose: true, message: 'Session can be closed' };
                } else {
                    const remainingTime = Math.ceil((minimumActiveUntil - now) / (1000 * 60)); // Minutes remaining
                    const hours = Math.floor(remainingTime / 60);
                    const minutes = remainingTime % 60;
                    
                    let timeString = '';
                    if (hours > 0) {
                        timeString = `${hours}h ${minutes}m`;
                    } else {
                        timeString = `${minutes}m`;
                    }
                    
                    return { 
                        canClose: false, 
                        message: `Minimum 2h active period - ${timeString} remaining`,
                        remainingMinutes: remainingTime
                    };
                }
            };

            const totalPoints = stories
                .map(story => getUserEstimation(story.id))
                .filter(points => points !== null)
                .reduce((sum, points) => sum + points, 0);

            const estimatedStories = stories
                .map(story => getUserEstimation(story.id))
                .filter(points => points !== null).length;

            // Dashboard functions
            const getEstimationStatus = () => {
                if (!currentSession) return [];
                
                return stories.map(story => {
                    const storyEstimations = currentSession.estimations[story.id] || {};
                    const estimatedBy = Object.keys(storyEstimations);
                    const notEstimatedBy = currentSession.participants
                        .map(p => `${p.name}_${p.role}`)
                        .filter(userId => !estimatedBy.includes(userId));
                    
                    // For non-PO/Admin users, hide OTHER users' estimation details until revealed
                    // But ALWAYS show the current user's own estimate
                    const isRevealed = isStoryRevealed(story.id);
                    const currentUserKey = `${user.name}_${user.role}`;
                    
                    return {
                        story,
                        estimatedBy: estimatedBy.map(userId => {
                            const [name, role] = userId.split('_');
                            const estimation = storyEstimations[userId];
                            const points = typeof estimation === 'object' ? estimation.points : estimation;
                            
                            // Show points if: PO/Admin, story is revealed, OR it's the current user's own estimate
                            const shouldShowPoints = hasPoPrivileges() || isRevealed || userId === currentUserKey;
                            
                            return { 
                                userId, 
                                name, 
                                role, 
                                points: shouldShowPoints ? points : '***' 
                            };
                        }),
                        notEstimatedBy: notEstimatedBy.map(userId => {
                            const [name, role] = userId.split('_');
                            return { userId, name, role };
                        }),
                        isComplete: (currentSession.completedStories && currentSession.completedStories[story.id]) || notEstimatedBy.length === 0,
                        isRevealed: isRevealed
                    };
                });
            };

            const generateSummary = () => {
                const status = getEstimationStatus();
                const completeStories = status.filter(s => s.isComplete);
                
                return completeStories.map(storyStatus => {
                    const estimates = storyStatus.estimatedBy
                        .map(e => e.points)
                        .filter(p => p !== null && p !== undefined && !isNaN(p));
                    
                    if (estimates.length === 0) return null;
                    
                    const average = estimates.reduce((a, b) => a + b, 0) / estimates.length;
                    const min = Math.min(...estimates);
                    const max = Math.max(...estimates);
                    
                    // Find most common estimate (mode)
                    const frequency = {};
                    estimates.forEach(est => frequency[est] = (frequency[est] || 0) + 1);
                    const mode = Object.keys(frequency).reduce((a, b) => frequency[a] > frequency[b] ? a : b);
                    
                    return {
                        story: storyStatus.story,
                        estimates: storyStatus.estimatedBy,
                        average: Math.round(average * 10) / 10,
                        min,
                        max,
                        mode: parseInt(mode),
                        consensus: min === max
                    };
                }).filter(summary => summary !== null);

                                {user.role === 'PO' && (() => {
