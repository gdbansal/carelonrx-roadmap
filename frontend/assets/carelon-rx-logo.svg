<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" preserveAspectRatio="xMidYMid meet">
  <!-- CarelonRx Logo -->
  <defs>
    <style>
      .purple { fill: #5B1E99; }
      .cyan { fill: #00A3E0; }
    </style>
  </defs>
  
  <!-- Icon/Symbol -->
  <g transform="translate(5, 20)">
    <!-- Top left circle -->
    <circle class="purple" cx="15" cy="15" r="12" fill="none" stroke="#5B1E99" stroke-width="5"/>
    <!-- Top right circle -->
    <circle class="cyan" cx="55" cy="15" r="12" fill="none" stroke="#00A3E0" stroke-width="5"/>
    <!-- Bottom left circle -->
    <circle class="cyan" cx="15" cy="55" r="12" fill="none" stroke="#00A3E0" stroke-width="5"/>
    <!-- Bottom right circle -->
    <circle class="purple" cx="55" cy="55" r="12" fill="none" stroke="#5B1E99" stroke-width="5"/>
    <!-- Connecting curves -->
    <path class="cyan" d="M 27 15 Q 35 15 35 23 Q 35 35 27 35" fill="none" stroke="#00A3E0" stroke-width="5"/>
    <path class="purple" d="M 43 15 Q 35 15 35 23 Q 35 35 43 35" fill="none" stroke="#5B1E99" stroke-width="5"/>
    <path class="purple" d="M 27 35 Q 35 35 35 43 Q 35 55 27 55" fill="none" stroke="#5B1E99" stroke-width="5"/>
    <path class="cyan" d="M 43 35 Q 35 35 35 43 Q 35 55 43 55" fill="none" stroke="#00A3E0" stroke-width="5"/>
  </g>
  
  <!-- Text: carelon -->
  <text x="95" y="65" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" class="purple">carelon</text>
  
  <!-- SM superscript -->
  <text x="545" y="35" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" class="purple">SM</text>
  
  <!-- Text: Rx -->
  <text x="500" y="105" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" class="purple">Rx</text>
</svg>
