<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" preserveAspectRatio="xMidYMid meet">
  <!-- CarelonRx Logo -->
  <defs>
    <style>
      .purple { fill: #4B1E78; }
      .cyan { fill: #00B5E2; }
      .light-purple { fill: #8B5FBF; }
    </style>
  </defs>
  
  <!-- Icon/Symbol - Four interlocking circles -->
  <g transform="translate(10, 80)">
    <!-- Top left circle (purple) -->
    <circle cx="30" cy="30" r="25" fill="none" stroke="#4B1E78" stroke-width="10"/>
    <!-- Top right circle (cyan) -->
    <circle cx="90" cy="30" r="25" fill="none" stroke="#00B5E2" stroke-width="10"/>
    <!-- Bottom left circle (light purple) -->
    <circle cx="30" cy="90" r="25" fill="none" stroke="#8B5FBF" stroke-width="10"/>
    <!-- Bottom right circle (cyan) -->
    <circle cx="90" cy="90" r="25" fill="none" stroke="#00B5E2" stroke-width="10"/>
    
    <!-- Connecting curves between circles -->
    <!-- Top horizontal connector -->
    <path d="M 55 30 Q 60 30 60 35 Q 60 60 55 60" fill="none" stroke="#00B5E2" stroke-width="10" stroke-linecap="round"/>
    <path d="M 65 30 Q 60 30 60 35 Q 60 60 65 60" fill="none" stroke="#4B1E78" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Bottom horizontal connector -->
    <path d="M 55 60 Q 60 60 60 65 Q 60 90 55 90" fill="none" stroke="#4B1E78" stroke-width="10" stroke-linecap="round"/>
    <path d="M 65 60 Q 60 60 60 65 Q 60 90 65 90" fill="none" stroke="#00B5E2" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Text: carelon -->
  <text x="160" y="140" font-family="'Gotham', 'Montserrat', 'Arial', sans-serif" font-size="80" font-weight="700" class="purple">carelon</text>
  
  <!-- SM superscript -->
  <text x="595" y="95" font-family="'Gotham', 'Montserrat', 'Arial', sans-serif" font-size="18" font-weight="500" class="purple">SM</text>
  
  <!-- Text: Rx -->
  <text x="550" y="210" font-family="'Gotham', 'Montserrat', 'Arial', sans-serif" font-size="60" font-weight="700" class="purple">Rx</text>
</svg>
