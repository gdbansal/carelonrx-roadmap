services:
  # Backend API Service
  - type: web
    name: carelonrx-roadmap-api
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: carelonrx-roadmap-frontend
    env: static
    buildCommand: echo "No build needed for static site"
    staticPublishPath: ./frontend
    headers:
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*.html
        name: Pragma
        value: no-cache
      - path: /*.html
        name: Expires
        value: "0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
